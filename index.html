<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Bắc Sơn - Liên hệ</title>
    <style>
        :root {
            --card-bg: rgba(22, 27, 34, 0.6); /* Làm nền trong suốt nhẹ để thấy nền chuyển động */
            --text-color: #c9d1d9;
            --hover-bg: rgba(33, 38, 45, 0.8);
            --border-color: rgba(48, 54, 61, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            
            /* Hiệu ứng nền chuyển động */
            background: linear-gradient(-45deg, #0d1117, #1a202c, #0d1117, #10141b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* Khung hình chuyển động của nền */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Tiện ích Thời tiết */
        .weather-widget {
            background-color: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 25px;
            color: #8b949e;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: color 0.3s ease;
        }

        .weather-widget:hover {
            color: #ffffff;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #30363d;
            margin-bottom: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .profile-logo:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            backdrop-filter: blur(8px); /* Hiệu ứng kính mờ (glassmorphism) */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease, box-shadow 0.25s ease;
            will-change: transform;
        }

        .link-card:hover {
            transform: translateY(-4px);
            background-color: var(--hover-bg);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: #4b5563;
        }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            margin-right: 18px;
            object-fit: cover;
        }

        .link-text {
            font-weight: 500;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .profile-logo {
                width: 100px;
                height: 100px;
            }
            .link-card {
                padding: 10px 15px;
            }
            .link-icon {
                width: 32px;
                height: 32px;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="weather-widget" id="weather-widget">
        <span id="weather-text">⏳ Đang tải thời tiết Hà Nội...</span>
    </div>

    <div class="profile-container">
        <img src="logo.png" alt="Profile Logo" class="profile-logo">
        <h1 class="profile-name">@bacson427</h1>
    </div>

    <div class="links-container">
        <a href="https://www.facebook.com/bacson427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="facebook.png" alt="Facebook" class="link-icon">
            <span class="link-text">Facebook</span>
        </a>

        <a href="https://www.threads.com/@nguyenbacson427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="threads.png" alt="Threads" class="link-icon">
            <span class="link-text">Threads</span>
        </a>

        <a href="https://locket.cam/bacson.427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="locket.jpg" alt="Locket" class="link-icon">
            <span class="link-text">Locket</span>
        </a>

        <a href="https://t.me/bacson_427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="telegram.jpg" alt="Telegram" class="link-icon">
            <span class="link-text">Telegram</span>
        </a>

        <a href="https://www.tiktok.com/@bacson.427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="tiktok.png" alt="TikTok" class="link-icon">
            <span class="link-text">TikTok</span>
        </a>

        <a href="https://wa.me/message/2WSCQKYPNQHCI1?src=qr" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="whatsapp.jpg" alt="WhatsApp" class="link-icon">
            <span class="link-text">WhatsApp</span>
        </a>

        <a href="https://zaloapp.com/qr/p/13gt23dbftkk0" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="zalo.png" alt="Zalo" class="link-icon">
            <span class="link-text">Zalo</span>
        </a>
    </div>

    <script>
        async function getHanoiWeather() {
            try {
                // Tọa độ của Hà Nội (Latitude: 21.0285, Longitude: 105.8542)
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=21.0285&longitude=105.8542&current_weather=true');
                const data = await response.json();
                
                if(data && data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    
                    // Phân loại icon thời tiết dựa trên mã code của WMO
                    let icon = "☁️"; // Mặc định là mây
                    if (code === 0) icon = "☀️"; // Trời quang
                    else if (code > 0 && code <= 3) icon = "⛅"; // Ít mây / Nhiều mây
                    else if (code >= 45 && code <= 48) icon = "🌫️"; // Sương mù
                    else if (code >= 51 && code <= 67) icon = "🌧️"; // Mưa phùn / Mưa rào
                    else if (code >= 71 && code <= 77) icon = "❄️"; // Tuyết
                    else if (code >= 80 && code <= 82) icon = "🌦️"; // Mưa rào
                    else if (code >= 95) icon = "⛈️"; // Giông bão

                    document.getElementById('weather-text').innerHTML = `${icon} Hà Nội: <b>${temp}°C</b>`;
                }
            } catch (error) {
                document.getElementById('weather-text').innerHTML = "Hà Nội: Lỗi tải thời tiết";
                console.error("Lỗi lấy dữ liệu thời tiết:", error);
            }
        }
        
        // Chạy hàm khi trang web tải xong
        getHanoiWeather();
        // Cập nhật lại thời tiết mỗi 30 phút (1800000 milliseconds)
        setInterval(getHanoiWeather, 1800000);
    </script>
</body>
</html>
