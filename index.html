<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NGUYỄN BẮC SƠN - Liên hệ</title>

    <style>
        :root {
            --bg-color: #0d1117; 
            --bg-gradient: radial-gradient(at 10% 20%, rgba(31, 111, 235, 0.15) 0px, transparent 50%),
                           radial-gradient(at 90% 10%, rgba(22, 27, 34, 0.6) 0px, transparent 50%),
                           radial-gradient(at 80% 50%, rgba(16, 118, 230, 0.12) 0px, transparent 50%),
                           radial-gradient(at 10% 80%, rgba(31, 111, 235, 0.18) 0px, transparent 50%),
                           radial-gradient(at 50% 50%, #0d1117 0px, #0d1117 100%);
            --card-bg: rgba(22, 27, 34, 0.4); 
            --text-color: #f0f6fc;
            --hover-bg: rgba(33, 38, 45, 0.6);
            --border-color: rgba(60, 68, 79, 0.4);
            --profile-name-gradient: linear-gradient(-45deg, #00C6FF, #0072FF, #8E2DE2, #4A00E0);
            --time-gradient: linear-gradient(-45deg, #00C6FF, #FF5E62, #FF9966, #0072FF);
        }

        html, body {
            margin: 0; padding: 0; width: 100%; 
            min-height: 100vh; /* Đổi sang min-height để background mượt khi cuộn */
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            background-size: 200% 200%;
            animation: mesh3D 18s ease infinite;
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 25px; box-sizing: border-box; perspective: 1000px;
            transition: background-color 1s ease, color 0.5s ease;
            position: relative;
        }

        @keyframes mesh3D {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .top-info-widget, .profile-container, .links-container {
            position: relative; z-index: 10;
        }

        /* ----- HIỆU ỨNG CHỮ ----- */
        @keyframes textColorMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-text {
            background-image: var(--time-gradient); background-size: 300% 300%;
            -webkit-background-clip: text; background-clip: text; color: transparent;
            animation: textColorMove 4s ease infinite; font-weight: bold;
        }

        /* Widget */
        .top-info-widget {
            background-color: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 25px;
            font-size: 1rem; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: all 0.3s ease;
        }
        .divider { width: 1px; height: 16px; background-color: var(--border-color); }

        /* ----- KHU VỰC AVATAR VÀ NÚT GỌI SONG SONG ----- */
        .profile-container {
            text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center;
        }

        .avatar-call-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px;
        }

        .profile-logo {
            width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--border-color); box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .profile-logo:hover { transform: scale(1.05) rotate(2deg); }

        .call-bubble {
            display: flex; width: 60px; height: 60px; background: #2ecc71; border-radius: 50%;
            align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer; transition: all 0.3s ease; text-decoration: none;
            animation: call-shake 1.5s infinite;
        }
        .call-bubble:hover { transform: scale(1.1); background: #27ae60; box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5); }
        .call-bubble svg { width: 28px; height: 28px; fill: white; }

        @keyframes call-shake {
            0% { transform: scale(1); }
            10%, 20% { transform: scale(1.1) rotate(-5deg); }
            30%, 50%, 70% { transform: scale(1.1) rotate(5deg); }
            40%, 60% { transform: scale(1.1) rotate(-5deg); }
            80%, 100% { transform: scale(1); }
        }

        /* Tên nhảy */
        .profile-name-wrapper {
            font-size: 1.8rem; font-weight: 700; margin: 0; display: inline-flex;
            color: transparent; background-image: var(--profile-name-gradient);
            background-size: 400% 400%; -webkit-background-clip: text;
            background-clip: text; animation: textColorMove 6s ease infinite;
        }
        .profile-name-wrapper > span { display: inline-block; transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1.2); cursor: default; }
        
        /* Hiệu ứng nảy chữ vĩnh viễn */
        .profile-name-wrapper > span {
            animation: letterJumpLoop 4s infinite cubic-bezier(0.36, 0.45, 0.63, 0.53);
        }
        @keyframes letterJumpLoop {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); color: inherit; }
            10% { transform: translateY(-10px) rotate(-5deg) scale(1.1); color: #fff; text-shadow: 0 0 10px #00C6FF; }
            20% { transform: translateY(0px) rotate(5deg) scale(1.05); }
            25% { transform: translateY(-3px) rotate(0deg); }
            30% { transform: translateY(0px); }
        }

        .profile-time-sub { font-size: 1.2rem; margin-top: 8px; letter-spacing: 2px; }

        /* ----- DANH SÁCH LINK BIO ----- */
        .links-container { 
            width: 100%; max-width: 450px; display: flex; flex-direction: column; 
            gap: 16px; 
            padding-bottom: 20px; /* Chỉnh lại padding cho vừa vặn */
        }
        .link-card {
            display: flex; align-items: center; background-color: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); border-radius: 14px; padding: 12px 20px; text-decoration: none; color: var(--text-color);
            position: relative; overflow: hidden; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.2s ease;
        }
        .link-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 3px; background: var(--profile-name-gradient); transition: width 0.4s ease; }
        .link-card::before { content: ''; position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.15)); transition: width 0.4s ease; z-index: 0; }
        .link-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); border-color: #58a6ff; }
        .link-card:hover::after, .link-card:hover::before { width: 100%; }
        .link-icon, .link-text { position: relative; z-index: 2; }
        .link-icon { width: 36px; height: 36px; border-radius: 8px; margin-right: 18px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .link-text { font-weight: 500; font-size: 1.1rem; }

        /* ----- DÒNG BẢN QUYỀN (CHUẨN LẠI) ----- */
        .copyright-footer {
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            padding-top: 10px;
            padding-bottom: 30px; /* Cách đáy trang một chút để nhìn thoáng */
        }

        @media (max-width: 480px) {
            .top-info-widget { font-size: 0.85rem; padding: 8px 15px; }
            .profile-logo { width: 90px; height: 90px; }
            .call-bubble { width: 50px; height: 50px; }
            .link-card { padding: 10px 15px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <script>
        // --- 0. LẤY NĂM BẢN QUYỀN TỰ ĐỘNG ---
        document.getElementById('current-year').innerText = new Date().getFullYear();

        // --- 1. HIỆU ỨNG TÊN NẢY BÓNG (Tách chữ và gài delay) ---
        const profileName = "NGUYỄN BẮC SƠN";
        const nameContainer = document.getElementById('profile-name');
        if(nameContainer) {
            const totalChars = profileName.length;
            nameContainer.innerHTML = profileName.split('').map((char, index) => 
                `<span style="animation-delay: -${(index / totalChars) * 4}s;">${char === ' ' ? '&nbsp;' : char}</span>`
            ).join('');
        }

        // --- 2. ĐỒNG HỒ TICK TẮC ---
        function updateClock() {
            const now = new Date();
            const days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            document.getElementById('date-text').innerText = `${days[now.getDay()]}, ${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
            document.getElementById('time-text').innerText = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. CẬP NHẬT THỜI TIẾT VÀ THEME NỀN ---
        async function getWeatherAndTheme() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=21.0285&longitude=105.8542&current_weather=true');
                const data = await response.json();
                
                if(data && data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    const isDay = data.current_weather.is_day; 
                    
                    let icon = "☁️"; let theme = {};
                    const root = document.documentElement;

                    if (isDay === 1) {
                        if (code === 0) { 
                            icon = "☀️"; // Trời nắng đẹp
                            theme = {
                                bg: '#e0f2fe',
                                gradient: 'radial-gradient(at 10% 20%, rgba(253, 224, 71, 0.4) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(56, 189, 248, 0.6) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(255, 255, 255, 0.8) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(125, 211, 252, 0.5) 0px, transparent 50%), radial-gradient(at 50% 50%, #bae6fd 0px, #e0f2fe 100%)',
                                cardBg: 'rgba(255, 255, 255, 0.6)', text: '#0f172a', hover: 'rgba(255, 255, 255, 0.9)', border: 'rgba(148, 163, 184, 0.5)',
                                nameGrad: 'linear-gradient(-45deg, #FF9966, #FF5E62, #00C6FF, #0072FF)',
                                timeGrad: 'linear-gradient(-45deg, #FF5E62, #FF9966, #FFD194)'
                            };
                        } else if (code > 0 && code <= 3) { 
                            icon = "⛅"; // Nhiều mây
                            theme = {
                                bg: '#cbd5e1',
                                gradient: 'radial-gradient(at 10% 20%, rgba(248, 250, 252, 0.5) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(148, 163, 184, 0.5) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(226, 232, 240, 0.7) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(203, 213, 225, 0.6) 0px, transparent 50%), radial-gradient(at 50% 50%, #e2e8f0 0px, #cbd5e1 100%)',
                                cardBg: 'rgba(248, 250, 252, 0.5)', text: '#334155', hover: 'rgba(248, 250, 252, 0.8)', border: 'rgba(100, 116, 139, 0.4)',
                                nameGrad: 'linear-gradient(-45deg, #00C6FF, #0072FF, #8E2DE2, #4A00E0)',
                                timeGrad: 'linear-gradient(-45deg, #00C6FF, #0072FF, #2193b0)'
                            };
                        } else { 
                            if (code >= 45 && code <= 48) icon = "🌫️";
                            else if (code >= 51 && code <= 67) icon = "🌧️";
                            else if (code >= 80 && code <= 82) icon = "🌦️";
                            else if (code >= 95) icon = "⛈️";
                            theme = {
                                bg: '#475569', // Mưa bão u ám
                                gradient: 'radial-gradient(at 10% 20%, rgba(100, 116, 139, 0.6) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(51, 65, 85, 0.7) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(71, 85, 105, 0.6) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(15, 23, 42, 0.4) 0px, transparent 50%), radial-gradient(at 50% 50%, #334155 0px, #475569 100%)',
                                cardBg: 'rgba(30, 41, 59, 0.6)', text: '#f8fafc', hover: 'rgba(30, 41, 59, 0.9)', border: 'rgba(148, 163, 184, 0.4)',
                                nameGrad: 'linear-gradient(-45deg, #a8c0ff, #3f2b96)',
                                timeGrad: 'linear-gradient(-45deg, #a8c0ff, #3f2b96, #00C6FF)'
                            };
                        }
                    } else { 
                        if (code === 0 || code <= 3) icon = "🌙";
                        else icon = "🌧️";
                        theme = {
                            bg: '#0d1117', // Ban đêm
                            gradient: 'radial-gradient(at 10% 20%, rgba(31, 111, 235, 0.15) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(22, 27, 34, 0.6) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(16, 118, 230, 0.12) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(31, 111, 235, 0.18) 0px, transparent 50%), radial-gradient(at 50% 50%, #0d1117 0px, #0d1117 100%)',
                            cardBg: 'rgba(22, 27, 34, 0.5)', text: '#f0f6fc', hover: 'rgba(33, 38, 45, 0.8)', border: 'rgba(60, 68, 79, 0.5)',
                            nameGrad: 'linear-gradient(-45deg, #00C6FF, #0072FF, #8E2DE2, #4A00E0)',
                            timeGrad: 'linear-gradient(-45deg, #00C6FF, #FF5E62, #FF9966, #0072FF)'
                        };
                    }

                    root.style.setProperty('--bg-color', theme.bg);
                    root.style.setProperty('--bg-gradient', theme.gradient);
                    root.style.setProperty('--card-bg', theme.cardBg);
                    root.style.setProperty('--text-color', theme.text);
                    root.style.setProperty('--hover-bg', theme.hover);
                    root.style.setProperty('--border-color', theme.border);
                    root.style.setProperty('--profile-name-gradient', theme.nameGrad);
                    root.style.setProperty('--time-gradient', theme.timeGrad); 

                    document.getElementById('weather-text').innerHTML = `${icon} Hà Nội: <b>${temp}°C</b>`;
                }
            } catch (error) {
                document.getElementById('weather-text').innerHTML = "Hà Nội: Lỗi kết nối";
            }
        }
        
        getWeatherAndTheme();
        setInterval(getWeatherAndTheme, 1800000); 

        // --- 4. BỘ GIÁP BẢO MẬT: CHẶN F12, CHUỘT PHẢI, SO SOI CODE ---
        document.addEventListener('keydown', function(e) {
            // Chặn F12
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Chặn Ctrl + Shift + I/J/C (Mở Inspect)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
            // Chặn Ctrl + U (Xem Source Code)
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
        });
    </script>
