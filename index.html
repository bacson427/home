<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGUYỄN BẮC SƠN - Liên hệ</title>
    <style>
        :root {
            /* Mặc định Night theme, sẽ được JavaScript ghi đè */
            --bg-color: #0d1117; 
            --bg-gradient: radial-gradient(at 10% 20%, rgba(31, 111, 235, 0.15) 0px, transparent 50%),
                           radial-gradient(at 90% 10%, rgba(22, 27, 34, 0.6) 0px, transparent 50%),
                           radial-gradient(at 80% 50%, rgba(16, 118, 230, 0.12) 0px, transparent 50%),
                           radial-gradient(at 10% 80%, rgba(31, 111, 235, 0.18) 0px, transparent 50%),
                           radial-gradient(at 50% 50%, #0d1117 0px, #0d1117 100%);
            --card-bg: rgba(22, 27, 34, 0.4); 
            --text-color: #f0f6fc;
            --hover-bg: rgba(33, 38, 45, 0.6);
            --border-color: rgba(60, 68, 79, 0.4);
            
            /* Biến CSS cho tên nhảy */
            --profile-name-gradient: linear-gradient(-45deg, #00C6FF, #0072FF, #8E2DE2, #4A00E0);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Nền 3D đổi màu theo thời gian */
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            background-size: 200% 200%;
            animation: mesh3D 18s ease infinite;
            
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            box-sizing: border-box;
            perspective: 1000px;
            transition: background-color 1s ease, color 0.5s ease;
        }

        @keyframes mesh3D {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Bộ đếm thời gian trên cùng */
        .top-time-widget {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 30px;
            color: var(--text-color);
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: translateZ(50px);
            transition: all 0.3s ease;
        }
        .top-time-widget:hover {
            transform: translateZ(60px);
            opacity: 1;
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
            transform: translateZ(70px);
        }

        .profile-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .profile-logo:hover {
            transform: scale(1.05) rotate(1deg);
        }

        /* Tên nhảy màu chuyển động */
        .profile-name-wrapper {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            display: inline-flex;
            color: transparent;
            background-image: var(--profile-name-gradient);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: gradientBG 8s ease infinite;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .profile-name-wrapper > span {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .profile-name-wrapper > span:hover {
            transform: translateY(-12px);
            color: #ffffff; /* Hiển thị chữ màu trắng khi hover */
            -webkit-background-clip: initial; /* Loại bỏ gradient khi hover để hiển thị chữ trắng */
            background-clip: initial;
        }

        /* Giờ dưới tên */
        .profile-time-sub {
            font-size: 1rem;
            color: var(--text-color);
            margin-top: 5px;
            opacity: 0.8;
            transform: translateZ(20px);
        }

        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
            perspective: 800px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease, box-shadow 0.3s ease, border-color 0.2s ease;
            will-change: transform;
            transform: translateZ(20px);
        }
        .link-card:hover {
            transform: translateY(-5px) translateZ(60px);
            background-color: var(--hover-bg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-color: var(--text-color);
        }

        .link-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            margin-right: 18px;
            object-fit: cover;
        }

        .link-text {
            font-weight: 500;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .profile-logo {
                width: 100px;
                height: 100px;
            }
            .link-card {
                padding: 10px 15px;
            }
            .link-icon {
                width: 32px;
                height: 32px;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="top-time-widget" id="top-time-widget">
        <span id="top-time-text">⏳ Đang tải ngày tháng...</span>
    </div>

    <div class="profile-container">
        <img src="logo.png" alt="Profile Logo" class="profile-logo">
        <h1 class="profile-name-wrapper" id="profile-name-wrapper">
            </h1>
        <div class="profile-time-sub" id="profile-time-sub">
            ⏳ Đang tải giờ...
        </div>
    </div>

    <div class="links-container">
        <a href="https://facebook.com/your-profile" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="facebook.png" alt="Facebook" class="link-icon">
            <span class="link-text">Facebook</span>
        </a>
        <a href="https://threads.net/@your-profile" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="threads.png" alt="Threads" class="link-icon">
            <span class="link-text">Threads</span>
        </a>
        <a href="https://locket.cam/your-profile" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="locket.jpg" alt="Locket" class="link-icon">
            <span class="link-text">Locket</span>
        </a>
        <a href="https://t.me/your-username" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="telegram.jpg" alt="Telegram" class="link-icon">
            <span class="link-text">Telegram</span>
        </a>
        <a href="https://www.tiktok.com/@your-username" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="tiktok.png" alt="TikTok" class="link-icon">
            <span class="link-text">TikTok</span>
        </a>
        <a href="https://wa.me/your-phone-number" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="whatsapp.jpg" alt="WhatsApp" class="link-icon">
            <span class="link-text">WhatsApp</span>
        </a>
        <a href="https://zalo.me/your-id-or-phone" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="zalo.png" alt="Zalo" class="link-icon">
            <span class="link-text">Zalo</span>
        </a>
    </div>

    <script>
        const profileName = "NGUYỄN BẮC SƠN";
        const root = document.documentElement;

        // Điền tên và bọc mỗi chữ cái trong thẻ span để tạo hiệu ứng nhảy
        const nameWrapper = document.getElementById('profile-name-wrapper');
        nameWrapper.innerHTML = profileName.split('').map(char => `<span>${char === ' ' ? '&nbsp;' : char}</span>`).join('');

        function updateDateTime() {
            // Lấy giờ địa phương Việt Nam (GMT+7)
            const now = new Date(new Date().getTime() + (new Date().getTimezoneOffset() + 420) * 60000);
            const hours = now.getHours();
            
            // 1. Cập nhật ngày tháng năm (Trên cùng)
            const dayNames = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            const dateStr = `${dayNames[now.getDay()]}, ${now.getDate()} tháng ${now.getMonth() + 1} năm ${now.getFullYear()}`;
            document.getElementById('top-time-text').innerText = dateStr;

            // 2. Cập nhật giờ phút giây (Dưới tên)
            const timeStr = `${hours.toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            document.getElementById('profile-time-sub').innerText = timeStr;

            // 3. Tự động đổi màu nền theo giờ địa phương Việt Nam (Day/Night Theme)
            let theme = {};

            if (hours >= 6 && hours < 18) { // Ban ngày (6h - 18h)
                theme = {
                    bg: '#e0f2fe',
                    gradient: 'radial-gradient(at 10% 20%, rgba(253, 224, 71, 0.4) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(56, 189, 248, 0.6) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(255, 255, 255, 0.8) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(125, 211, 252, 0.5) 0px, transparent 50%), radial-gradient(at 50% 50%, #bae6fd 0px, #e0f2fe 100%)',
                    cardBg: 'rgba(255, 255, 255, 0.5)', text: '#0f172a', hover: 'rgba(255, 255, 255, 0.8)', border: 'rgba(148, 163, 184, 0.4)',
                    nameGradient: 'linear-gradient(-45deg, #FF9966, #FF5E62, #00C6FF, #0072FF)'
                };
            } else { // Ban đêm
                theme = {
                    bg: '#0d1117',
                    gradient: 'radial-gradient(at 10% 20%, rgba(31, 111, 235, 0.15) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(22, 27, 34, 0.6) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(16, 118, 230, 0.12) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(31, 111, 235, 0.18) 0px, transparent 50%), radial-gradient(at 50% 50%, #0d1117 0px, #0d1117 100%)',
                    cardBg: 'rgba(22, 27, 34, 0.4)', text: '#f0f6fc', hover: 'rgba(33, 38, 45, 0.6)', border: 'rgba(60, 68, 79, 0.4)',
                    nameGradient: 'linear-gradient(-45deg, #00C6FF, #0072FF, #8E2DE2, #4A00E0)'
                };
            }

            root.style.setProperty('--bg-color', theme.bg);
            root.style.setProperty('--bg-gradient', theme.gradient);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--text-color', theme.text);
            root.style.setProperty('--hover-bg', theme.hover);
            root.style.setProperty('--border-color', theme.border);
            root.style.setProperty('--profile-name-gradient', theme.nameGradient);
        }

        updateDateTime(); // Chạy ngay lập tức khi tải trang
        setInterval(updateDateTime, 1000); // Cập nhật lại mỗi giây
    </script>
</body>
</html>
