    <style>
        :root {
            --card-bg: rgba(22, 27, 34, 0.4); 
            --text-color: #f0f6fc;
            --border-color: rgba(60, 68, 79, 0.4);
            --profile-name-gradient: linear-gradient(-45deg, #00C6FF, #0072FF, #8E2DE2, #4A00E0);
            --time-gradient: linear-gradient(-45deg, #00C6FF, #FF5E62, #FF9966, #0072FF);
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 25px; box-sizing: border-box; perspective: 1000px;
            /* Chống bôi đen text copy (Tùy chọn thêm cho an toàn) */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* --- CONTAINER CHO CANVAS 3D --- */
        #sky-canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #0d1117;
            transition: background-color 2s ease;
        }

        .top-info-widget, .profile-container, .links-container { position: relative; z-index: 10; }

        /* Widget */
        .top-info-widget {
            background-color: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color); padding: 8px 20px; border-radius: 25px;
            font-size: 1rem; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: all 0.3s ease;
        }
        .divider { width: 1px; height: 16px; background-color: var(--border-color); }
        .gradient-text {
            background-image: var(--time-gradient); background-size: 300% 300%;
            -webkit-background-clip: text; background-clip: text; color: transparent;
            animation: textColorMove 4s ease infinite; font-weight: bold;
        }

        /* ----- KHU VỰC PROFILE ----- */
        .profile-container {
            text-align: center; margin-bottom: 30px;
            display: flex; flex-direction: column; align-items: center;
        }
        .profile-logo {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--border-color); box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            margin-bottom: 12px; transition: transform 0.3s ease;
        }
        .profile-logo:hover { transform: scale(1.05) rotate(2deg); }

        .call-bubble {
            display: flex; width: 60px; height: 60px; background: #2ecc71; border-radius: 50%;
            align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer; text-decoration: none; margin-bottom: 15px;
            animation: call-shake 1.5s infinite; transition: 0.3s;
        }
        .call-bubble:hover { transform: scale(1.1); background: #27ae60; box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5); }
        .call-bubble svg { width: 28px; height: 28px; fill: white; }
        @keyframes call-shake {
            0% { transform: scale(1); }
            10%, 20% { transform: scale(1.1) rotate(-5deg); }
            30%, 50%, 70% { transform: scale(1.1) rotate(5deg); }
            40%, 60% { transform: scale(1.1) rotate(-5deg); }
            80%, 100% { transform: scale(1); }
        }

        /* --- HIỆU ỨNG NẢY CHỮ --- */
        .profile-name-wrapper {
            font-size: 1.8rem; font-weight: 700; margin: 0; display: inline-flex;
            color: transparent; background-image: var(--profile-name-gradient);
            background-size: 400% 400%; -webkit-background-clip: text; background-clip: text;
            animation: textColorMove 6s ease infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .profile-name-wrapper span {
            display: inline-block; cursor: default;
            animation: letterJumpLoop 4s infinite cubic-bezier(0.36, 0.45, 0.63, 0.53);
        }
        @keyframes letterJumpLoop {
            0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); color: inherit; }
            10% { transform: translateY(-10px) rotate(-5deg) scale(1.1); color: #fff; text-shadow: 0 0 10px #00C6FF; }
            20% { transform: translateY(0px) rotate(5deg) scale(1.05); }
            25% { transform: translateY(-3px) rotate(0deg); }
            30% { transform: translateY(0px); }
        }
        @keyframes textColorMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .profile-time-sub { font-size: 1.2rem; margin-top: 8px; letter-spacing: 2px; }

        /* ----- DANH SÁCH LINK ----- */
        .links-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 40px; }
        .link-card {
            display: flex; align-items: center; background-color: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); border-radius: 14px; padding: 12px 20px;
            text-decoration: none; color: var(--text-color); position: relative; overflow: hidden; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .link-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0%; height: 3px; background: var(--profile-name-gradient); transition: width 0.4s ease; }
        .link-card:hover { transform: translateY(-5px); border-color: #58a6ff; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .link-card:hover::after { width: 100%; }
        .link-icon { width: 36px; height: 36px; border-radius: 8px; margin-right: 18px; object-fit: cover; }
    </style>
</head>

    <script>
        // ==========================================
        // BỘ GIÁP BẢO MẬT CHỐNG SOI CODE KỊCH TRẦN
        // ==========================================
        
        // 1. Chặn click chuột phải trên toàn bộ trang
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. Chặn các tổ hợp phím tắt của DevTools
        document.addEventListener('keydown', function(e) {
            // Chặn F12
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Chặn Ctrl + Shift + I (Inspect) / J (Console) / C (Element)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
            // Chặn Ctrl + U (View Source)
            if (e.ctrlKey && e.keyCode === 85) {
                e.preventDefault();
                return false;
            }
        });


        // --- CÀI ĐẶT SPLIT TÊN VÀ ĐỒNG HỒ ---
        const profileName = "NGUYỄN BẮC SƠN";
        const nameContainer = document.getElementById('profile-name');
        if(nameContainer) {
            const totalChars = profileName.length;
            nameContainer.innerHTML = profileName.split('').map((char, index) => 
                `<span style="animation-delay: -${(index / totalChars) * 4}s;">${char === ' ' ? '&nbsp;' : char}</span>`
            ).join('');
        }

        function updateClock() {
            const now = new Date();
            const days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
            document.getElementById('date-text').innerText = `${days[now.getDay()]}, ${now.getDate()}/${now.getMonth() + 1}/${now.getFullYear()}`;
            document.getElementById('time-text').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000); updateClock();

        // --- HỆ THỐNG MÂY 3D VÀ BẦU TRỜI ---
        let scene, camera, renderer, cloudParticles = [], flash, sunSphere, moonSphere, directionalLight;

        function init3DSky() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = 1.16;
            camera.rotation.y = -0.12;
            camera.rotation.z = 0.27;

            scene.add(new THREE.AmbientLight(0x555555));
            directionalLight = new THREE.DirectionalLight(0xffeedd);
            directionalLight.position.set(0,0,1);
            scene.add(directionalLight);

            sunSphere = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({color: 0xffffaa}));
            sunSphere.position.set(-200, 400, -500);
            scene.add(sunSphere);

            moonSphere = new THREE.Mesh(new THREE.SphereGeometry(40, 32, 32), new THREE.MeshBasicMaterial({color: 0xdddddd}));
            moonSphere.position.set(200, 300, -500);
            scene.add(moonSphere);

            renderer = new THREE.WebGLRenderer({alpha: true, antialias: true});
            scene.fog = new THREE.FogExp2(0x11111f, 0.002);
            renderer.setClearColor(scene.fog.color);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('sky-canvas-container').appendChild(renderer.domElement);

            const cloudGeo = new THREE.PlaneBufferGeometry(500,500);
            const cloudMaterial = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, depthWrite: false });

            for(let p=0; p<50; p++) {
                let cloud = new THREE.Mesh(cloudGeo, cloudMaterial);
                cloud.position.set(Math.random()*800 -400, 500, Math.random()*500 - 450);
                cloud.rotation.x = 1.16; cloud.rotation.y = -0.12; cloud.rotation.z = Math.random()*360;
                cloud.material.opacity = 0.2;
                cloudParticles.push(cloud); scene.add(cloud);
            }
            render3D();
        }

        function render3D() {
            cloudParticles.forEach(p => {
                p.rotation.z -=0.002; p.position.x += 0.5;
                if(p.position.x > 400) p.position.x = -400;
            });
            renderer.render(scene, camera);
            requestAnimationFrame(render3D);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3DSky();

        // --- CẬP NHẬT THỜI TIẾT ---
        async function getWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=21.0285&longitude=105.8542&current_weather=true');
                const data = await res.json();
                if(data && data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    const isDay = data.current_weather.is_day;
                    let icon = "☁️";
                    const container = document.getElementById('sky-canvas-container');

                    if(isDay === 1) { 
                        sunSphere.visible = true; moonSphere.visible = false;
                        if(code === 0 || code <= 3) { 
                            icon = code === 0 ? "☀️" : "⛅";
                            container.style.backgroundColor = '#87CEEB'; scene.fog.color.setHex(0x87CEEB);
                            directionalLight.intensity = 1.5;
                            cloudParticles.forEach(p => { p.material.color.setHex(0xffffff); p.material.opacity = 0.1; });
                        } else { 
                            icon = "🌧️";
                            container.style.backgroundColor = '#556B2F'; scene.fog.color.setHex(0x556B2F);
                            directionalLight.intensity = 0.5;
                            cloudParticles.forEach(p => { p.material.color.setHex(0x888888); p.material.opacity = 0.4; });
                        }
                    } else { 
                        sunSphere.visible = false; moonSphere.visible = true;
                        if(code === 0 || code <= 3) { 
                            icon = "🌙";
                            container.style.backgroundColor = '#0d1117'; scene.fog.color.setHex(0x0d1117);
                            directionalLight.intensity = 0.2;
                            cloudParticles.forEach(p => { p.material.color.setHex(0xaaaaff); p.material.opacity = 0.1; });
                        } else { 
                            icon = "🌧️";
                            container.style.backgroundColor = '#05050a'; scene.fog.color.setHex(0x05050a);
                            moonSphere.visible = false; 
                            cloudParticles.forEach(p => { p.material.color.setHex(0x333333); p.material.opacity = 0.5; });
                        }
                    }
                    document.getElementById('weather-text').innerHTML = `${icon} Hà Nội: <b>${temp}°C</b>`;
                }
            } catch (e) { document.getElementById('weather-text').innerText = "Hà Nội: Lỗi kết nối"; }
        }
        getWeather(); setInterval(getWeather, 1800000);
    </script>
