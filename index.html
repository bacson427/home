<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Bắc Sơn - Liên hệ</title>
    <style>
        /* Cài đặt màu sắc - Giao diện Dark Mode lấy cảm hứng từ GitHub */
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --hover-bg: #21262d;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 50px 20px;
            box-sizing: border-box;
        }

        /* Khung Profile */
        .profile-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .profile-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%; /* Bo tròn logo cá nhân */
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Hiệu ứng mượt cho avatar */
        .profile-logo:hover {
            transform: scale(1.05);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 5px 0;
            color: #ffffff;
        }

        /* Khung chứa các nút link */
        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Nút mạng xã hội */
        .link-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-color);
            /* Tối ưu hiệu ứng mượt: dùng cubic-bezier và will-change */
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease, box-shadow 0.25s ease;
            will-change: transform;
        }

        /* Hiệu ứng khi di chuột qua */
        .link-card:hover {
            transform: translateY(-4px); /* Nảy lên nhẹ */
            background-color: var(--hover-bg);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3); /* Bóng đổ nổi khối */
        }

        /* Logo của các app */
        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px; /* Bo góc nhẹ cho các icon */
            margin-right: 18px;
            object-fit: cover;
        }

        .link-text {
            font-weight: 500;
            font-size: 1.1rem;
        }

        /* Tối ưu cho màn hình điện thoại nhỏ */
        @media (max-width: 480px) {
            .profile-logo {
                width: 110px;
                height: 110px;
            }
            .link-card {
                padding: 10px 15px;
            }
            .link-icon {
                width: 32px;
                height: 32px;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="logo.png" alt="Profile Logo" class="profile-logo">
        <h1 class="profile-name">@bacson427</h1>
    </div>

    <div class="links-container">
        <a href="https://www.facebook.com/bacson427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="facebook.png" alt="Facebook" class="link-icon">
            <span class="link-text">Facebook</span>
        </a>

        <a href="https://www.threads.com/@nguyenbacson427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="threads.png" alt="Threads" class="link-icon">
            <span class="link-text">Threads</span>
        </a>

        <a href="https://locket.cam/bacson.427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="locket.jpg" alt="Locket" class="link-icon">
            <span class="link-text">Locket</span>
        </a>

        <a href="https://t.me/bacson_427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="telegram.jpg" alt="Telegram" class="link-icon">
            <span class="link-text">Telegram</span>
        </a>

        <a href="https://www.tiktok.com/@bacson.427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="tiktok.png" alt="TikTok" class="link-icon">
            <span class="link-text">TikTok</span>
        </a>

        <a href="https://wa.me/message/2WSCQKYPNQHCI1?src=qr" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="whatsapp.jpg" alt="WhatsApp" class="link-icon">
            <span class="link-text">WhatsApp</span>
        </a>

        <a href="https://zaloapp.com/qr/p/13gt23dbftkk0" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="zalo.png" alt="Zalo" class="link-icon">
            <span class="link-text">Zalo</span>
        </a>
    </div>

</body>
</html>
