<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Bắc Sơn - Liên hệ</title>
    <style>
        /* Biến CSS mặc định (Sẽ được JavaScript ghi đè theo thời tiết thực tế) */
        :root {
            --bg-color: #0d1117; 
            --bg-gradient: radial-gradient(at 10% 20%, rgba(31, 111, 235, 0.15) 0px, transparent 50%),
                           radial-gradient(at 90% 10%, rgba(22, 27, 34, 0.6) 0px, transparent 50%),
                           radial-gradient(at 80% 50%, rgba(16, 118, 230, 0.12) 0px, transparent 50%),
                           radial-gradient(at 10% 80%, rgba(31, 111, 235, 0.18) 0px, transparent 50%),
                           radial-gradient(at 50% 50%, #0d1117 0px, #0d1117 100%);
            --card-bg: rgba(22, 27, 34, 0.4); 
            --text-color: #f0f6fc;
            --hover-bg: rgba(33, 38, 45, 0.6);
            --border-color: rgba(60, 68, 79, 0.4);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Nền 3D phản hồi theo thời tiết */
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            background-size: 200% 200%;
            animation: mesh3D 18s ease infinite;
            
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
            perspective: 1000px;
            transition: background-color 1s ease, color 0.5s ease;
        }

        @keyframes mesh3D {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Widget Thời tiết */
        .weather-widget {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 25px;
            color: var(--text-color);
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            transform: translateZ(50px);
            opacity: 0.8;
        }

        .weather-widget:hover {
            opacity: 1;
            transform: translateZ(60px);
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
            transform: translateZ(70px);
        }

        .profile-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin-bottom: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .profile-logo:hover {
            transform: scale(1.05) rotate(1deg);
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-color);
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .links-container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
            perspective: 800px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 20px;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease, box-shadow 0.3s ease, border-color 0.2s ease;
            will-change: transform;
            transform: translateZ(20px);
        }

        .link-card:hover {
            transform: translateY(-5px) translateZ(60px);
            background-color: var(--hover-bg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border-color: var(--text-color);
        }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            margin-right: 18px;
            object-fit: cover;
        }

        .link-text {
            font-weight: 500;
            font-size: 1.1rem;
        }

        @media (max-width: 480px) {
            .profile-logo {
                width: 100px;
                height: 100px;
            }
            .link-card {
                padding: 10px 15px;
            }
            .link-icon {
                width: 32px;
                height: 32px;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="weather-widget" id="weather-widget">
        <span id="weather-text">⏳ Đang tải thời tiết Hà Nội...</span>
    </div>

    <div class="profile-container">
        <img src="logo.png" alt="Profile Logo" class="profile-logo">
        <h1 class="profile-name">@bacson427</h1>
    </div>

    <div class="links-container">
        <a href="https://www.facebook.com/bacson427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="facebook.png" alt="Facebook" class="link-icon">
            <span class="link-text">Facebook</span>
        </a>
        <a href="https://www.threads.com/@nguyenbacson427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="threads.png" alt="Threads" class="link-icon">
            <span class="link-text">Threads</span>
        </a>
        <a href="https://locket.cam/bacson.427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="locket.jpg" alt="Locket" class="link-icon">
            <span class="link-text">Locket</span>
        </a>
        <a href="https://t.me/bacson_427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="telegram.jpg" alt="Telegram" class="link-icon">
            <span class="link-text">Telegram</span>
        </a>
        <a href="https://www.tiktok.com/@bacson.427" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="tiktok.png" alt="TikTok" class="link-icon">
            <span class="link-text">TikTok</span>
        </a>
        <a href="https://wa.me/message/2WSCQKYPNQHCI1?src=qr" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="whatsapp.jpg" alt="WhatsApp" class="link-icon">
            <span class="link-text">WhatsApp</span>
        </a>
        <a href="https://zaloapp.com/qr/p/13gt23dbftkk0" class="link-card" target="_blank" rel="noopener noreferrer">
            <img src="zalo.png" alt="Zalo" class="link-icon">
            <span class="link-text">Zalo</span>
        </a>
    </div>

    <script>
        async function getHanoiWeatherAndApplyTheme() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=21.0285&longitude=105.8542&current_weather=true');
                const data = await response.json();
                
                if(data && data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    const isDay = data.current_weather.is_day; // Trả về 1 là ngày, 0 là đêm
                    
                    let icon = "☁️"; 
                    let theme = {};
                    const root = document.documentElement;

                    // KIỂM TRA ĐIỀU KIỆN THỜI TIẾT ĐỂ ĐỔI MÀU NỀN
                    if (isDay === 1) {
                        if (code === 0) { // Nắng
                            icon = "☀️"; 
                            theme = {
                                bg: '#e0f2fe',
                                gradient: 'radial-gradient(at 10% 20%, rgba(253, 224, 71, 0.4) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(56, 189, 248, 0.6) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(255, 255, 255, 0.8) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(125, 211, 252, 0.5) 0px, transparent 50%), radial-gradient(at 50% 50%, #bae6fd 0px, #e0f2fe 100%)',
                                cardBg: 'rgba(255, 255, 255, 0.5)', text: '#0f172a', hover: 'rgba(255, 255, 255, 0.8)', border: 'rgba(148, 163, 184, 0.4)'
                            };
                        } else if (code > 0 && code <= 3) { // Nhiều mây
                            icon = "⛅"; 
                            theme = {
                                bg: '#cbd5e1',
                                gradient: 'radial-gradient(at 10% 20%, rgba(248, 250, 252, 0.5) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(148, 163, 184, 0.5) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(226, 232, 240, 0.7) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(203, 213, 225, 0.6) 0px, transparent 50%), radial-gradient(at 50% 50%, #e2e8f0 0px, #cbd5e1 100%)',
                                cardBg: 'rgba(248, 250, 252, 0.4)', text: '#334155', hover: 'rgba(248, 250, 252, 0.7)', border: 'rgba(100, 116, 139, 0.3)'
                            };
                        } else { // Mưa, sương mù, dông bão
                            if (code >= 45 && code <= 48) icon = "🌫️";
                            else if (code >= 51 && code <= 67) icon = "🌧️";
                            else if (code >= 80 && code <= 82) icon = "🌦️";
                            else if (code >= 95) icon = "⛈️";
                            theme = {
                                bg: '#475569',
                                gradient: 'radial-gradient(at 10% 20%, rgba(100, 116, 139, 0.6) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(51, 65, 85, 0.7) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(71, 85, 105, 0.6) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(15, 23, 42, 0.4) 0px, transparent 50%), radial-gradient(at 50% 50%, #334155 0px, #475569 100%)',
                                cardBg: 'rgba(30, 41, 59, 0.5)', text: '#f8fafc', hover: 'rgba(30, 41, 59, 0.8)', border: 'rgba(148, 163, 184, 0.3)'
                            };
                        }
                    } else { 
                        // Ban Đêm
                        if (code === 0 || code <= 3) icon = "🌙";
                        else icon = "🌧️"; // Đêm có mưa
                        theme = {
                            bg: '#0d1117',
                            gradient: 'radial-gradient(at 10% 20%, rgba(31, 111, 235, 0.15) 0px, transparent 50%), radial-gradient(at 90% 10%, rgba(22, 27, 34, 0.6) 0px, transparent 50%), radial-gradient(at 80% 50%, rgba(16, 118, 230, 0.12) 0px, transparent 50%), radial-gradient(at 10% 80%, rgba(31, 111, 235, 0.18) 0px, transparent 50%), radial-gradient(at 50% 50%, #0d1117 0px, #0d1117 100%)',
                            cardBg: 'rgba(22, 27, 34, 0.4)', text: '#f0f6fc', hover: 'rgba(33, 38, 45, 0.6)', border: 'rgba(60, 68, 79, 0.4)'
                        };
                    }

                    // Áp dụng chủ đề màu sắc lên website
                    root.style.setProperty('--bg-color', theme.bg);
                    root.style.setProperty('--bg-gradient', theme.gradient);
                    root.style.setProperty('--card-bg', theme.cardBg);
                    root.style.setProperty('--text-color', theme.text);
                    root.style.setProperty('--hover-bg', theme.hover);
                    root.style.setProperty('--border-color', theme.border);

                    document.getElementById('weather-text').innerHTML = `${icon} Hà Nội: <b>${temp}°C</b>`;
                }
            } catch (error) {
                document.getElementById('weather-text').innerHTML = "Hà Nội: Lỗi tải thời tiết";
                console.error("Lỗi lấy dữ liệu:", error);
            }
        }
        
        getHanoiWeatherAndApplyTheme();
        setInterval(getHanoiWeatherAndApplyTheme, 1800000);
    </script>
</body>
</html>
