    <style>
        /* --- 1. CẤU HÌNH NỀN MỚI (MẠNG LƯỚI CÔNG NGHỆ) --- */

        /* --- 2. AVATAR NEON --- */
        .profile-card {

            padding: 40px 20px 30px;

            /* Thêm hiệu ứng mượt khi di chuột 3D */
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            transform-style: preserve-3d;

        .profile-img-wrapper {
            position: relative;
            width: 160px; height: 160px; 
            margin: -80px auto 25px auto; 
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            /* Hào quang Tech Xanh Cyan */

                        0 0 50px rgba(2, 132, 199, 0.4);
            animation: neonPulseTech 3s ease-in-out infinite alternate;
            /* Đẩy ảnh nhô lên trong không gian 3D */

        }
        @keyframes neonPulseTech {
            from { box-shadow: 0 0 25px rgba(100, 255, 218, 0.6), 0 0 50px rgba(2, 132, 199, 0.4); scale: 1; }
            to   { box-shadow: 0 0 40px rgba(100, 255, 218, 0.8), 0 0 70px rgba(2, 132, 199, 0.6); scale: 1.03; }
        }

        .profile-img-wrapper::before {
            content: ''; position: absolute; inset: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent, #64ffda, transparent, #0ea5e9);

        @keyframes smoothSpin {

        .link-button:hover { transform: translateY(-5px) scale(1.02); background: rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.4), inset 0 0 15px rgba(100,255,218,0.1); border-color: rgba(100,255,218,0.4); }

        .menu-dropdown a { display: block; padding: 10px 20px; color: #ccd6f6; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .menu-dropdown a:hover { background: rgba(100,255,218,0.1); color: #64ffda; padding-left: 25px; }

        .ai-button:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(100, 255, 218, 0.6); }
    </style>

    <script>
        // Slot machine effect
        document.addEventListener('DOMContentLoaded', () => {
            const el = document.querySelector('.slot-machine'); 
            let count = 0;
            const interval = setInterval(() => {
                el.textContent = Math.floor(Math.random() * 99999999).toString().padStart(8, '0');
                count++; 
                if (count > 30) { 
                    clearInterval(interval); 
                    el.textContent = "04 02 2007"; 
                }
            }, 50);
        });
        
        // Menu toggle
        document.getElementById('hamburgerMenu').addEventListener('click', () => { 
            const m = document.getElementById('menuDropdown'); 
            m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
        });

        // --- HIỆU ỨNG TƯƠNG TÁC CHUỘT 3D (PARALLAX TILT) ---
        const profileCard = document.getElementById('profileCard');
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) { // Chỉ bật hiệu ứng nghiêng trên màn hình lớn
                let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                profileCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });
        // Reset lại vị trí cũ khi chuột rời khỏi trang
        document.addEventListener('mouseleave', () => {
            profileCard.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- HIỆU ỨNG MẠNG LƯỚI CÔNG NGHỆ TƯƠNG TÁC (NETWORK PARTICLES) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = []; 
        let isPlaying = false;

        // Bắt tọa độ chuột
        let mouse = {
            x: null,
            y: null,
            radius: 150 // Bán kính tương tác của chuột
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });
        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });
        // Hỗ trợ cảm ứng trên Mobile
        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });
        window.addEventListener('touchend', function() {
            mouse.x = null;
            mouse.y = null;
        });

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
            initParticles();
        }
        window.addEventListener('resize', resize); 

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                // Tăng tốc độ khi nhạc bật
                let speedMultiplier = isPlaying ? 3 : 1;
                
                // Tương tác chuột (Lực đẩy từ trường)
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        // Lực đẩy tỷ lệ nghịch với khoảng cách
                        const force = (mouse.radius - distance) / mouse.radius; 
                        this.x -= forceDirectionX * force * 2;
                        this.y -= forceDirectionY * force * 2;
                    }
                }

                this.x += this.vx * speedMultiplier;
                this.y += this.vy * speedMultiplier;

                // Nảy lại khi chạm viền
                if (this.x < 0) { this.x = 0; this.vx *= -1; }
                if (this.x > canvas.width) { this.x = canvas.width; this.vx *= -1; }
                if (this.y < 0) { this.y = 0; this.vy *= -1; }
                if (this.y > canvas.height) { this.y = canvas.height; this.vy *= -1; }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = isPlaying ? '#ff00cc' : '#64ffda';
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            let numParticles = (window.innerWidth * window.innerHeight) / 12000;
            if(numParticles > 150) numParticles = 150; // Giới hạn số lượng cho mượt
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                // Vẽ tia kết nối giữa các hạt
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        
                        let alpha = 1 - (distance / 120);
                        if(isPlaying) {
                            ctx.strokeStyle = `rgba(255, 0, 204, ${alpha * 0.5})`;
                        } else {
                            ctx.strokeStyle = `rgba(100, 255, 218, ${alpha * 0.3})`;
                        }
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
                
                // Vẽ tia kết nối từ hạt đến con trỏ chuột
                if (mouse.x != null && mouse.y != null) {
                    let dxMouse = mouse.x - particles[i].x;
                    let dyMouse = mouse.y - particles[i].y;
                    let distanceMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);
                    
                    if (distanceMouse < mouse.radius) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        let alphaMouse = 1 - (distanceMouse / mouse.radius);
                        ctx.strokeStyle = isPlaying ? `rgba(255, 0, 204, ${alphaMouse * 0.8})` : `rgba(100, 255, 218, ${alphaMouse * 0.6})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            drawLines();
            
            requestAnimationFrame(animate);
        }

        resize();
        animate();

        // Xử lý sự kiện Âm nhạc
        const audio = document.getElementById('main-audio');
        const musicStatus = document.getElementById('musicStatus');
        const musicWrapper = document.getElementById('musicWrapper');

        audio.addEventListener('play', () => { 
            isPlaying = true; 
            musicStatus.innerHTML = "🎶 Hệ thống đang đồng bộ nhịp điệu... 🚀";
            musicWrapper.classList.add('playing');
        });
        audio.addEventListener('pause', () => { 
            isPlaying = false; 
            musicStatus.innerHTML = "🎧 Bật nhạc để kích hoạt hiệu ứng 🌐";
            musicWrapper.classList.remove('playing');
        });
        audio.addEventListener('ended', () => { 
            isPlaying = false; 
            musicStatus.innerHTML = "🎧 Bật nhạc để kích hoạt hiệu ứng 🌐";
            musicWrapper.classList.remove('playing');
        });

    </script>
