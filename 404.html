<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang | Nguyễn Bắc Sơn</title>
    <style>
        /* Đặt lại lề mặc định */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Định dạng nền và căn giữa nội dung */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Hộp chứa nội dung lỗi */
        .error-container {
            max-width: 550px;
            padding: 40px 30px;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Định dạng logo */
        .logo {
            max-width: 250px;
            height: auto;
            margin-bottom: 25px;
            border-radius: 8px;
        }

        /* Chữ 404 */
        h1 {
            font-size: 80px;
            font-weight: 800;
            color: #e53935;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(229, 57, 53, 0.3);
        }

        /* Tiêu đề phụ */
        h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #f5f5f5;
        }

        /* Đoạn văn bản mô tả */
        p {
            font-size: 16px;
            color: #bbbbbb;
            line-height: 1.6;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        /* Nút quay lại trang chủ */
        .btn-home {
            display: inline-block;
            padding: 12px 28px;
            background-color: #e53935;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(229, 57, 53, 0.4);
        }

        /* Hiệu ứng khi di chuột vào nút */
        .btn-home:hover {
            background-color: #c62828;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(229, 57, 53, 0.6);
        }
        
        /* Chỉnh lại kích thước cho màn hình điện thoại */
        @media (max-width: 600px) {
            .error-container {
                margin: 20px;
                padding: 30px 20px;
            }
            h1 {
                font-size: 60px;
            }
            .logo {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="https://nguyenbacson.io.vn/nguyen-bac-son-cover.png" alt="Nguyễn Bắc Sơn Cover" class="logo">
        
        <h1>404</h1>
        <h2>Không tìm thấy trang</h2>
        <p>Trang bạn đang tìm kiếm có thể đã bị xóa, đổi tên hoặc tạm thời không truy cập được. Hãy kiểm tra lại đường dẫn hoặc quay về trang chủ để tiếp tục nhé.</p>
        
        <a href="https://nguyenbacson.io.vn" class="btn-home">Quay lại trang chủ</a>
    </div>
</body>
</html>
