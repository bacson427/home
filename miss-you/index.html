<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miss You ❤️</title>
    <meta property="og:title" content="Happy Birthday - Nguyễn Bắc Sơn">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* ================= RESET & CORE ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body, html {
            width: 100vw; height: 100dvh;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #1a0b1c, #4a0d22, #8b103e, #4a0d22);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            perspective: 1000px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 25px 25px; z-index: 0; pointer-events: none;
        }

        /* ================= GLASS BOX (MINIMALIST PREMIUM) ================= */
        .glass-box {
            position: relative; z-index: 10;
            width: 90%; max-width: 400px;
            padding: 35px 20px 25px 20px; border-radius: 35px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.1);
            transform: translate3d(0, 0, 0);
            will-change: transform; /* Bật tăng tốc GPU */
            animation: floatGlass 6s ease-in-out infinite;
        }

        /* Đổi sang translate3d để tăng tốc phần cứng */
        @keyframes floatGlass {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -10px, 0); }
        }

        /* --- ICONS SINH NHẬT --- */
        .heart-beat-box { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 5px; }
        .hb-icon { font-size: 40px; will-change: transform; animation: floatIcon 3s ease-in-out infinite alternate; }
        .hb-icon.cake { 
            font-size: 65px; margin-top: -15px;
            animation: heartBeat 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; 
            filter: drop-shadow(0 0 15px rgba(255, 200, 100, 0.8));
        }

        @keyframes floatIcon {
            0% { transform: translate3d(0, 0, 0) rotate(-5deg); }
            100% { transform: translate3d(0, -10px, 0) rotate(5deg); }
        }
        @keyframes heartBeat {
            0%, 30%, 100% { transform: scale3d(1, 1, 1); }
            15%, 45% { transform: scale3d(1.15, 1.15, 1); }
        }

        /* --- NEON BIRTHDAY TITLE --- */
        .neon-title {
            font-family: 'Dancing Script', cursive; font-size: clamp(2.5rem, 10vw, 3.5rem);
            margin-bottom: 5px; line-height: 1.1;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff00aa;
            animation: neonPulsate 1.5s infinite alternate;
        }
        .subtitle {
            font-size: 0.95rem; color: #ffd1dc; margin-bottom: 20px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; opacity: 0.9;
        }

        /* Giảm bớt số lớp shadow ảo để chống lag CPU */
        @keyframes neonPulsate {
            0% { text-shadow: 0 0 2px #fff, 0 0 5px #ff00aa; }
            100% { text-shadow: 0 0 5px #fff, 0 0 20px #ff00aa, 0 0 30px #ff00aa; }
        }

        /* ================= CLOCK (NEON STYLE) ================= */
        #clock { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .time-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 5px; border-radius: 20px; flex: 1;
            box-shadow: inset 0 4px 6px rgba(255,255,255,0.05);
        }
        .time-item span { 
            display: block; font-size: clamp(1.6rem, 5.5vw, 2.2rem); font-weight: 700; 
            color: #fff; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; 
        }
        .time-item p { 
            font-size: 0.65rem; text-transform: uppercase; margin-top: 5px; 
            color: #ffd1dc; letter-spacing: 1px; font-weight: 600;
        }

        audio { width: 100%; height: 35px; opacity: 0.8; border-radius: 20px; margin-bottom: 10px;}

        /* ================= BUTTON VIP ================= */
        .btn-newyear {
            position: relative; display: inline-block; text-decoration: none;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            color: white; padding: 16px 25px; border-radius: 50px; 
            font-weight: 800; font-size: 1.05rem; letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 8, 68, 0.5);
            transition: all 0.3s ease; overflow: hidden; width: 100%;
        }
        .btn-newyear:active { transform: scale(0.92); box-shadow: 0 4px 15px rgba(255, 8, 68, 0.4); }

        .footer { margin-top: 15px; font-size: 0.75rem; opacity: 0.7; font-weight: 500; }

        /* ================= PARTICLES & CANVAS ================= */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .balloons-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        .balloon {
            position: absolute; bottom: -120px; width: 45px; height: 60px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), var(--c1) 40%, var(--c2) 85%);
            animation: floatUp var(--d) linear infinite; will-change: transform; opacity: 0.8;
        }
        .balloon::after { content: ''; position: absolute; bottom: -25px; left: 50%; width: 1px; height: 25px; background: rgba(255,255,255,0.4); }
        
        .bday-emoji {
            position: absolute; bottom: -80px; animation: floatUp var(--d) linear forwards;
            will-change: transform; font-size: clamp(25px, 6vw, 40px); z-index: 2;
        }

        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; overflow: hidden; }
        .confetti {
            position: absolute; top: -20px; width: 12px; height: 12px;
            animation: fall linear forwards; will-change: transform;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        @keyframes floatUp {
            0% { transform: translate3d(0, 0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translate3d(var(--x), -120dvh, 0) rotate(var(--r)); opacity: 0; }
        }
        @keyframes fall {
            0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate3d(0, 110dvh, 0) rotate(720deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="bg-pattern"></div>
    <div class="balloons-container" id="balloonBox"></div>
    <div id="confetti-container"></div>
    <canvas id="fwCanvas"></canvas>

    <div class="glass-box">
        <div class="heart-beat-box">
            <div class="hb-icon">🎈</div>
            <div class="hb-icon cake">🎂</div>
            <div class="hb-icon">🎉</div>
        </div>

        <div class="neon-title">Happy Birthday Yeuu</div>
        <div class="subtitle">Yeuu Của Ngố ❤️</div>
        
        <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 8px; font-weight: bold;">THỜI GIAN BÊN NHAU</div>
        <div id="clock">
            <div class="time-item" id="b-days"> <span id="days">00</span> <p>Ngày</p> </div>
            <div class="time-item" id="b-hours"> <span id="hours">00</span> <p>Giờ</p> </div>
            <div class="time-item" id="b-mins"> <span id="mins">00</span> <p>Phút</p> </div>
            <div class="time-item" id="b-secs"> <span id="secs">00</span> <p>Giây</p> </div>
        </div>

        <audio id="player" controls loop autoplay>
            <source src="https://nguyenbacson.io.vn/miss-you/Happy-Birthday-To-You/Chuc-Mung-Sinh-Nhat.mp3" type="audio/mpeg">
        </audio>

        <button onclick="window.location.href='https://nguyenbacson.io.vn/miss-you/Happy-Birthday-To-You/'" class="btn-newyear">❤️ HAPPY BIRTHDAY ❤️</button>

        <div class="footer">Chạm đúp vào màn hình để gửi nụ hôn 💋</div>
    </div>

    <script>
        const isMobile = window.innerWidth < 768;
        const PI2 = Math.PI * 2; // Tối ưu tính toán

        // --- 1. HỆ THỐNG TRANG TRÍ ---
        function createBalloons() {
            const container = document.getElementById('balloonBox');
            const colors = [ {c1: '#ff9a9e', c2: '#ff6b81'}, {c1: '#a18cd1', c2: '#fbc2eb'}, {c1: '#f6d365', c2: '#fda085'} ];
            for (let i = 0; i < 5; i++) {
                const b = document.createElement('div'); b.className = 'balloon';
                const color = colors[i % colors.length];
                b.style.left = (i * 20 + 10) + 'vw';
                b.style.setProperty('--c1', color.c1); b.style.setProperty('--c2', color.c2);
                b.style.setProperty('--d', (12 + Math.random() * 8) + 's');
                b.style.setProperty('--x', (Math.random() - 0.5) * 50 + 'px');
                b.style.setProperty('--r', (Math.random() - 0.5) * 30 + 'deg');
                b.style.animationDelay = - (Math.random() * 15) + 's';
                container.appendChild(b);
            }
        }
        createBalloons();

        function spawnBdayEmojis() {
            const emojis = ['🎂', '🎁', '🎉', '✨', '🎈', '🍰', '💐'];
            const container = document.getElementById('balloonBox');
            const el = document.createElement('div'); el.className = 'bday-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (Math.random() * 90 + 5) + 'vw';
            el.style.setProperty('--d', (10 + Math.random() * 6) + 's');
            el.style.setProperty('--x', (Math.random() - 0.5) * 100 + 'px');
            el.style.setProperty('--r', (Math.random() - 0.5) * 60 + 'deg');
            container.appendChild(el);
            setTimeout(() => el.remove(), 16000);
        }
        setInterval(spawnBdayEmojis, 2500);

        function spawnConfetti(amount) {
            const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ffd700', '#00f5d4', '#fff'];
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < amount; i++) {
                let conf = document.createElement('div'); conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if(Math.random() > 0.5) conf.style.borderRadius = '50%';
                else { conf.style.width = '10px'; conf.style.height = '18px'; }
                conf.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }
        setInterval(() => spawnConfetti(4), 1000); 

        // --- 2. HỆ THỐNG PHÁO HOA ---
        const cvs = document.getElementById('fwCanvas');
        const ctx = cvs.getContext('2d', { alpha: true }); // Tối ưu render
        let rockets = [], particles = [];
        let flashAlpha = 0; 

        function resize() { 
            const dpr = window.devicePixelRatio || 1;
            cvs.width = window.innerWidth * dpr; 
            cvs.height = window.innerHeight * dpr; 
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize); resize();

        class Rocket {
            constructor(x, targetY) {
                this.x = x; this.y = window.innerHeight; this.targetY = targetY;
                this.speed = 12 + Math.random() * 4;
                this.color = '#fff'; 
            }
            update() {
                this.y -= this.speed;
                // TỐI ƯU: Vẽ vòng tròn mờ thay vì dùng shadowBlur gây giật lag
                ctx.fillStyle = 'rgba(255, 0, 85, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, PI2); ctx.fill();
                
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, PI2); ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color, isHeart = false) {
                this.x = x; this.y = y; this.color = color;
                this.life = 1; this.decay = Math.random() * 0.02 + 0.015;
                if(!isHeart) {
                    let angle = Math.random() * PI2;
                    let speed = Math.random() * 6 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.grav = 0.15; 
                } else {
                    this.grav = 0.05; 
                }
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, Math.random()*2+1.5, 0, PI2); ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += this.grav; this.life -= this.decay;
                this.vx *= 0.96; this.vy *= 0.96; 
            }
        }

        function explode(x, y, type='heart') {
            flashAlpha = 0.4; 
            const colors = ['#ff0055', '#ff477e', '#ffd700', '#fff'];
            let c = colors[Math.floor(Math.random()*colors.length)];
            
            if(type === 'heart') {
                const pCount = 35; 
                for(let i=0; i<pCount; i++) {
                    let t = (PI2 * i) / pCount;
                    let hx = 16 * Math.pow(Math.sin(t), 3);
                    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    let p = new Particle(x, y, c, true);
                    p.vx = hx * 0.2; p.vy = hy * 0.2; 
                    particles.push(p);
                }
            } else {
                for(let i=0; i<40; i++) particles.push(new Particle(x, y, c));
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight); 
            
            if(flashAlpha > 0) {
                ctx.fillStyle = `rgba(255, 100, 150, ${flashAlpha})`;
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                flashAlpha -= 0.05;
            }

            for(let i = rockets.length - 1; i >= 0; i--) {
                let r = rockets[i]; r.update();
                if(r.y <= r.targetY) { 
                    explode(r.x, r.y, Math.random() > 0.4 ? 'heart' : 'circle'); 
                    rockets.splice(i, 1); 
                }
            }
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1; 
        }
        loop();

        function launchDoubleFireworks() {
            const w = window.innerWidth; const h = window.innerHeight;
            rockets.push(new Rocket(w * 0.25, h * 0.25));
            rockets.push(new Rocket(w * 0.75, h * 0.3));
        }

        // --- 3. ĐỒNG HỒ ---
        const start = new Date(2025, 11, 24, 10, 50, 0).getTime();
        let lastSec = -1;

        function updateTime() {
            const now = new Date().getTime();
            const diff = now - start;
            if (diff < 0) return;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
            document.getElementById('mins').innerText = m < 10 ? '0'+m : m;
            document.getElementById('secs').innerText = s < 10 ? '0'+s : s;

            if ((s === 0 || s === 30) && s !== lastSec) { launchDoubleFireworks(); lastSec = s; }
            if (s !== 0 && s !== 30) lastSec = -1;
        }
        setInterval(updateTime, 1000); updateTime();

        // --- 4. TƯƠNG TÁC CHẠM ---
        document.addEventListener('click', () => { const aud = document.getElementById('player'); if(aud.paused) aud.play(); }, {once:true});
        
        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const now = new Date().getTime();
            if(now - lastTap < 400) { 
                let x = e.changedTouches[0].clientX; let y = e.changedTouches[0].clientY;
                createClickEffect(x, y);
                explode(x, y, 'circle'); 
            }
            lastTap = now;
        });

        function createClickEffect(x, y) {
            const el = document.createElement('div'); el.innerText = '💋';
            el.style.cssText = `position:absolute;left:${x}px;top:${y}px;font-size:35px;pointer-events:none;animation:flyMini 1s ease-out forwards;filter:drop-shadow(0 0 10px #ff0055);z-index:999;transform-origin:center;`;
            el.style.setProperty('--tx', (Math.random()-0.5)*50+'px');
            el.style.setProperty('--rot', (Math.random()-0.5)*40+'deg');
            document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>
