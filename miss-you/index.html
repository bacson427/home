<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miss You ❤️</title>
    <meta property="og:title" content="Happy Birthday - Nguyễn Bắc Sơn">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* ================= RESET & CORE ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body, html {
            width: 100vw; height: 100dvh;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #1a0b1c, #4a0d22, #8b103e, #4a0d22);
            background-size: 200% 200%; /* Giảm kích thước nền động để đỡ lag */
            animation: gradientBG 20s ease infinite; /* Giãn thời gian chuyển màu */
            perspective: 1000px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 25px 25px; z-index: 0; pointer-events: none;
        }

        /* ================= GLASS BOX ================= */
        .glass-box {
            position: relative; z-index: 10;
            width: 90%; max-width: 400px;
            padding: 35px 20px 25px 20px; border-radius: 35px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); /* Giảm độ mờ để tăng hiệu năng */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255,255,255,0.1);
            transform: translateY(0);
            animation: floatGlass 6s ease-in-out infinite;
            will-change: transform; /* Tối ưu hoạt ảnh trôi nổi */
        }

        @keyframes floatGlass {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* --- ICONS --- */
        .heart-beat-box { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 5px; }
        .hb-icon { font-size: 40px; animation: floatIcon 3s ease-in-out infinite alternate; will-change: transform; }
        .hb-icon.cake { 
            font-size: 65px; margin-top: -15px;
            animation: heartBeat 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; 
            filter: drop-shadow(0 0 10px rgba(255, 200, 100, 0.6));
        }

        @keyframes floatIcon {
            0% { transform: translateY(0px) rotate(-5deg); }
            100% { transform: translateY(-10px) rotate(5deg); }
        }
        @keyframes heartBeat {
            0%, 30%, 100% { transform: scale(1); }
            15%, 45% { transform: scale(1.15); }
        }

        /* --- TEXT --- */
        .neon-title {
            font-family: 'Dancing Script', cursive; font-size: clamp(2.5rem, 10vw, 3.5rem);
            margin-bottom: 5px; line-height: 1.1;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 15px #ff00aa, 0 0 30px #ff00aa; /* Giảm bớt shadow cho nhẹ */
            animation: neonPulsate 2s infinite alternate; /* Giãn nhịp nháy */
        }
        .subtitle {
            font-size: 0.95rem; color: #ffd1dc; margin-bottom: 20px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; opacity: 0.9;
        }

        @keyframes neonPulsate {
            0% { text-shadow: 0 0 5px #fff, 0 0 15px #ff00aa; }
            100% { text-shadow: 0 0 5px #fff, 0 0 20px #ff00aa, 0 0 40px #ff00aa; }
        }

        /* ================= CLOCK ================= */
        #clock { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .time-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 5px; border-radius: 20px; flex: 1;
            box-shadow: inset 0 4px 6px rgba(255,255,255,0.05);
        }
        .time-item span { 
            display: block; font-size: clamp(1.6rem, 5.5vw, 2.2rem); font-weight: 700; 
            color: #fff; text-shadow: 0 0 10px #ff0055; 
        }
        .time-item p { 
            font-size: 0.65rem; text-transform: uppercase; margin-top: 5px; 
            color: #ffd1dc; letter-spacing: 1px; font-weight: 600;
        }

        audio { width: 100%; height: 35px; opacity: 0.8; border-radius: 20px; margin-bottom: 10px;}

        /* ================= BUTTON VIP ================= */
        .btn-newyear {
            position: relative; display: inline-block; text-decoration: none;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            color: white; padding: 16px 25px; border-radius: 50px; 
            font-weight: 800; font-size: 1.05rem; letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.3); cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 8, 68, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease; overflow: hidden; width: 100%;
            will-change: transform;
        }
        .btn-newyear:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255, 8, 68, 0.3); }

        .footer { margin-top: 15px; font-size: 0.75rem; opacity: 0.7; font-weight: 500; }

        /* ================= PARTICLES & CANVAS ================= */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .balloons-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        .balloon {
            position: absolute; bottom: -120px; width: 40px; height: 55px; /* Thu nhỏ bóng bay một chút */
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), var(--c1) 40%, var(--c2) 85%);
            animation: floatUp var(--d) linear infinite; will-change: transform; opacity: 0.8;
        }
        .balloon::after { content: ''; position: absolute; bottom: -25px; left: 50%; width: 1px; height: 25px; background: rgba(255,255,255,0.4); }
        
        .bday-emoji {
            position: absolute; bottom: -80px; animation: floatUp var(--d) linear forwards;
            will-change: transform; font-size: clamp(25px, 6vw, 40px); z-index: 2;
        }

        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; overflow: hidden; }
        .confetti {
            position: absolute; top: -20px; width: 10px; height: 10px; /* Thu nhỏ hạt giấy */
            animation: fall linear forwards; will-change: transform;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120dvh) translateX(var(--x)) rotate(var(--r)); opacity: 0; }
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110dvh) rotate(360deg); opacity: 0; } /* Giảm góc xoay */
        }
        
        @keyframes flyMini {
            0% { transform: translate(0,0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tx), -80px) rotate(var(--rot)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    
    <div class="bg-pattern"></div>
    <div class="balloons-container" id="balloonBox"></div>
    <div id="confetti-container"></div>
    <canvas id="fwCanvas"></canvas>

    <div class="glass-box">
        <div class="heart-beat-box">
            <div class="hb-icon">🎈</div>
            <div class="hb-icon cake">🎂</div>
            <div class="hb-icon">🎉</div>
        </div>

        <div class="neon-title">Happy Birthday Yeuu</div>
        <div class="subtitle">Yeuu Của Ngố ❤️</div>
        
        <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 8px; font-weight: bold;">THỜI GIAN BÊN NHAU</div>
        <div id="clock">
            <div class="time-item" id="b-days"> <span id="days">00</span> <p>Ngày</p> </div>
            <div class="time-item" id="b-hours"> <span id="hours">00</span> <p>Giờ</p> </div>
            <div class="time-item" id="b-mins"> <span id="mins">00</span> <p>Phút</p> </div>
            <div class="time-item" id="b-secs"> <span id="secs">00</span> <p>Giây</p> </div>
        </div>

        <audio id="player" controls loop autoplay>
            <source src="https://nguyenbacson.io.vn/miss-you/Happy-Birthday-To-You/Chuc-Mung-Sinh-Nhat.mp3" type="audio/mpeg">
        </audio>

        <button onclick="window.location.href='https://nguyenbacson.io.vn/miss-you/Happy-Birthday-To-You/'" class="btn-newyear">🎁 BẤM VÀO ĐÂY ĐỂ NHẬN QUÀ</button>

        <div class="footer">Chạm đúp vào màn hình để gửi nụ hôn 💋</div>
    </div>

    <script>
        // --- 1. HỆ THỐNG TRANG TRÍ (Đã tối ưu số lượng) ---
        function createBalloons() {
            const container = document.getElementById('balloonBox');
            const colors = [ {c1: '#ff9a9e', c2: '#ff6b81'}, {c1: '#a18cd1', c2: '#fbc2eb'}, {c1: '#f6d365', c2: '#fda085'} ];
            // Giảm từ 5 xuống 3 quả bóng cố định
            for (let i = 0; i < 3; i++) {
                const b = document.createElement('div'); b.className = 'balloon';
                const color = colors[i % colors.length];
                b.style.left = (Math.random() * 80 + 10) + 'vw';
                b.style.setProperty('--c1', color.c1); b.style.setProperty('--c2', color.c2);
                b.style.setProperty('--d', (15 + Math.random() * 10) + 's'); // Bay chậm hơn
                b.style.setProperty('--x', (Math.random() - 0.5) * 50 + 'px');
                b.style.setProperty('--r', (Math.random() - 0.5) * 30 + 'deg');
                b.style.animationDelay = - (Math.random() * 10) + 's';
                container.appendChild(b);
            }
        }
        createBalloons();

        function spawnBdayEmojis() {
            const emojis = ['🎂', '🎁', '🎉', '✨', '🎈', '🍰'];
            const container = document.getElementById('balloonBox');
            const el = document.createElement('div'); el.className = 'bday-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (Math.random() * 90 + 5) + 'vw';
            el.style.setProperty('--d', (12 + Math.random() * 8) + 's');
            el.style.setProperty('--x', (Math.random() - 0.5) * 80 + 'px');
            el.style.setProperty('--r', (Math.random() - 0.5) * 60 + 'deg');
            container.appendChild(el);
            setTimeout(() => el.remove(), 20000);
        }
        // Giãn thời gian sinh emoji từ 2.5s lên 4s
        setInterval(spawnBdayEmojis, 4000); 

        function spawnConfetti(amount) {
            const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ffd700', '#00f5d4', '#fff'];
            const container = document.getElementById('confetti-container');
            // Giới hạn tối đa số confetti trên màn hình để chống lag
            if(container.childElementCount > 30) return; 
            
            for (let i = 0; i < amount; i++) {
                let conf = document.createElement('div'); conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if(Math.random() > 0.5) conf.style.borderRadius = '50%';
                else { conf.style.width = '8px'; conf.style.height = '14px'; }
                conf.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }
        // Giãn nhịp sinh confetti từ 1s lên 2s, số lượng từ 4 xuống 2
        setInterval(() => spawnConfetti(2), 2000); 

        // --- 2. HỆ THỐNG PHÁO HOA TỐI ƯU ---
        const cvs = document.getElementById('fwCanvas');
        const ctx = cvs.getContext('2d', { alpha: false }); // Tắt alpha cho canvas nền tĩnh để render nhanh hơn
        let rockets = [], particles = [];
        let flashAlpha = 0; 
        let animationFrameId = null;
        let isAnimating = false; // Trạng thái vòng lặp

        function resize() { 
            const dpr = window.devicePixelRatio || 1;
            cvs.width = window.innerWidth * dpr; 
            cvs.height = window.innerHeight * dpr; 
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize); resize();

        class Rocket {
            constructor(x, targetY) {
                this.x = x; this.y = window.innerHeight; this.targetY = targetY;
                this.speed = 14 + Math.random() * 4; // Bay nhanh hơn chút để nhanh kết thúc
                this.color = '#fff'; 
            }
            update() {
                this.y -= this.speed;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color, isHeart = false) {
                this.x = x; this.y = y; this.color = color;
                this.life = 1; this.decay = Math.random() * 0.03 + 0.02; // Chết nhanh hơn
                if(!isHeart) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 5 + 2; // Giảm tốc độ văng
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.grav = 0.2; 
                } else {
                    this.grav = 0.08; 
                }
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, Math.random()*1.5+1, 0, Math.PI*2); ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += this.grav; this.life -= this.decay;
                this.vx *= 0.95; this.vy *= 0.95; 
            }
        }

        function explode(x, y, type='heart') {
            const colors = ['#ff0055', '#ff477e', '#ffd700', '#fff'];
            let c = colors[Math.floor(Math.random()*colors.length)];
            
            if(type === 'heart') {
                const pCount = 20; // Giảm từ 35 xuống 20 hạt
                for(let i=0; i<pCount; i++) {
                    let t = (Math.PI * 2 * i) / pCount;
                    let hx = 16 * Math.pow(Math.sin(t), 3);
                    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    let p = new Particle(x, y, c, true);
                    p.vx = hx * 0.15; p.vy = hy * 0.15; 
                    particles.push(p);
                }
            } else {
                for(let i=0; i<25; i++) particles.push(new Particle(x, y, c)); // Giảm từ 40 xuống 25
            }
            startAnimation(); // Đảm bảo vòng lặp chạy
        }

        function startAnimation() {
            if (!isAnimating) {
                isAnimating = true;
                loop();
            }
        }

        function loop() {
            // Xóa nền (canvas trong suốt mờ)
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.globalCompositeOperation = 'lighter'; // Blend mode xịn xò cho pháo hoa

            for(let i = rockets.length - 1; i >= 0; i--) {
                let r = rockets[i]; r.update();
                if(r.y <= r.targetY) { 
                    explode(r.x, r.y, Math.random() > 0.3 ? 'heart' : 'circle'); 
                    rockets.splice(i, 1); 
                }
            }
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1; 

            // Kiểm tra xem có cần chạy tiếp không để tiết kiệm pin
            if (rockets.length > 0 || particles.length > 0) {
                animationFrameId = requestAnimationFrame(loop);
            } else {
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight); // Xóa sạch khi xong
                isAnimating = false;
            }
        }

        function launchDoubleFireworks() {
            const w = window.innerWidth; const h = window.innerHeight;
            rockets.push(new Rocket(w * 0.25, h * 0.3));
            rockets.push(new Rocket(w * 0.75, h * 0.35));
            startAnimation();
        }

        // --- 3. ĐỒNG HỒ ---
        const start = new Date(2025, 11, 24, 10, 50, 0).getTime();
        let lastSec = -1;

        function updateTime() {
            const now = new Date().getTime();
            const diff = now - start;
            if (diff < 0) return;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
            document.getElementById('mins').innerText = m < 10 ? '0'+m : m;
            document.getElementById('secs').innerText = s < 10 ? '0'+s : s;

            // Giảm tần suất bắn pháo hoa tự động xuống mỗi phút thay vì 30s
            if (s === 0 && s !== lastSec) { launchDoubleFireworks(); lastSec = s; }
            if (s !== 0) lastSec = -1;
        }
        setInterval(updateTime, 1000); updateTime();

        // --- 4. TƯƠNG TÁC CHẠM ---
        document.addEventListener('click', () => { const aud = document.getElementById('player'); if(aud.paused) aud.play(); }, {once:true});
        
        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const now = new Date().getTime();
            if(now - lastTap < 400) { 
                let x = e.changedTouches[0].clientX; let y = e.changedTouches[0].clientY;
                createClickEffect(x, y);
                explode(x, y, 'circle'); 
            }
            lastTap = now;
        });

        function createClickEffect(x, y) {
            const el = document.createElement('div'); el.innerText = '💋';
            el.style.cssText = `position:absolute;left:${x}px;top:${y}px;font-size:35px;pointer-events:none;animation:flyMini 1s ease-out forwards;z-index:999;transform-origin:center;will-change:transform, opacity;`;
            el.style.setProperty('--tx', (Math.random()-0.5)*50+'px');
            el.style.setProperty('--rot', (Math.random()-0.5)*40+'deg');
            document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>
