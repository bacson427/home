<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Miss You - VIP</title>
    <meta property="og:title" content="Miss You - Nguyễn Bắc Sơn">
    <meta property="og:image" content="https://nguyenbacson.io.vn/miss-you.png">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* ================= RESET & CORE ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body, html {
            width: 100vw; height: 100dvh; /* dvh giúp fix lỗi thanh cuộn trên mobile */
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            /* Nền Gradient động sang trọng */
            background: linear-gradient(45deg, #1a0b1c, #4a0d22, #8b103e, #4a0d22);
            background-size: 300% 300%;
            animation: gradientBG 15s ease infinite;
            perspective: 1000px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-pattern {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 25px 25px; z-index: 0; pointer-events: none;
        }

        /* ================= GLASS BOX (PREMIUM) ================= */
        .glass-box {
            position: relative; z-index: 10;
            width: 90%; max-width: 400px;
            padding: 35px 25px; border-radius: 35px;
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.1);
            transform: translateY(0);
            animation: floatGlass 6s ease-in-out infinite;
        }

        @keyframes floatGlass {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Vòng sáng quanh hộp */
        .glass-box::before {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 36px; z-index: -1;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent 50%, rgba(255,0,85,0.6));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            padding: 1px;
        }

        .heart-beat-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .hb-icon { 
            font-size: 50px; 
            animation: heartBeat 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; 
            filter: drop-shadow(0 0 15px rgba(255, 0, 85, 0.8));
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        h1 {
            font-family: 'Dancing Script', cursive; font-size: clamp(2rem, 8vw, 2.8rem);
            margin-bottom: 25px; line-height: 1.2;
            background: linear-gradient(to right, #fff, #ffd1dc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* ================= CLOCK (NEON STYLE) ================= */
        #clock { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .time-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 5px; border-radius: 20px; flex: 1;
            box-shadow: inset 0 4px 6px rgba(255,255,255,0.05);
        }
        .time-item span { 
            display: block; font-size: clamp(1.8rem, 6vw, 2.2rem); font-weight: 700; 
            color: #fff; text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055; /* NEON GLOW */
        }
        .time-item p { 
            font-size: 0.7rem; text-transform: uppercase; margin-top: 5px; 
            color: #ffd1dc; letter-spacing: 1px; font-weight: 600;
        }

        .date-start { 
            display: inline-block; padding: 8px 25px; 
            background: rgba(255,255,255,0.1); border-radius: 30px; 
            font-size: 0.95rem; margin-bottom: 20px; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 1px;
        }

        /* Ánh sáng lướt qua Audio */
        audio { width: 100%; height: 35px; opacity: 0.8; border-radius: 20px; margin-bottom: 10px;}

        /* ================= BUTTON VIP ================= */
        .btn-newyear {
            position: relative; display: inline-block; text-decoration: none;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            color: white; padding: 15px 30px; border-radius: 50px; 
            font-weight: 800; font-size: 1.05rem; letter-spacing: 0.5px;
            border: none; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 8, 68, 0.5);
            transition: all 0.3s ease; overflow: hidden;
            width: 100%;
        }
        .btn-newyear:active { transform: scale(0.92); box-shadow: 0 4px 15px rgba(255, 8, 68, 0.4); }
        .btn-newyear::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg) translateY(-100%);
            transition: transform 0.5s;
        }
        .btn-newyear:active::after { transform: rotate(45deg) translateY(100%); }

        .footer { margin-top: 20px; font-size: 0.8rem; opacity: 0.7; font-weight: 500; }

        /* ================= PARTICLES & CANVAS ================= */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none; }
        
        .balloons-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        .balloon {
            position: absolute; bottom: -120px; width: 45px; height: 60px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), var(--c1) 40%, var(--c2) 85%);
            animation: floatUp var(--d) linear infinite; will-change: transform; opacity: 0.8;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }
        .balloon::after { content: ''; position: absolute; bottom: -25px; left: 50%; width: 1px; height: 25px; background: rgba(255,255,255,0.4); }
        
        .bday-emoji {
            position: absolute; bottom: -80px; animation: floatUp var(--d) linear forwards;
            will-change: transform; font-size: clamp(25px, 6vw, 40px); z-index: 2;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        #confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; overflow: hidden; }
        .confetti {
            position: absolute; top: -20px; width: 12px; height: 12px;
            animation: fall linear forwards; will-change: transform;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        /* Tim nhỏ bay ra từ đồng hồ */
        .mini-heart {
            position: absolute; left: 50%; bottom: 50%; transform: translate(-50%, 50%);
            font-size: 22px; pointer-events: none; opacity: 0;
            animation: flyMini 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            filter: drop-shadow(0 0 5px rgba(255,0,85,0.8));
        }

        /* Nụ hôn nhấp đúp */
        .kiss-mark {
            position: absolute; font-size: 35px; pointer-events: none;
            animation: flyMini 1s ease-out forwards; filter: drop-shadow(0 0 10px #ff0055); z-index: 999;
            transform-origin: center;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-120dvh) translateX(var(--x)) rotate(var(--r)); opacity: 0; }
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110dvh) rotate(720deg) scale(0.5); opacity: 0; }
        }
        @keyframes flyMini {
            0% { opacity: 1; transform: translate(-50%, 0) scale(0.5); }
            100% { opacity: 0; transform: translate(calc(-50% + var(--tx)), -120px) scale(1.3) rotate(var(--rot)); }
        }

    </style>
</head>
<body>
    
    <div class="bg-pattern"></div>
    <div class="balloons-container" id="balloonBox"></div>
    <div id="confetti-container"></div>
    <canvas id="fwCanvas"></canvas>

    <div class="glass-box">
        <div class="heart-beat-box">
            <div class="hb-icon">💖</div>
            <div class="hb-icon">💖</div>
        </div>

        <h1>Chúng mình đã quen nhau</h1>
        
        <div id="clock">
            <div class="time-item" id="b-days"> <span id="days">00</span> <p>Ngày</p> </div>
            <div class="time-item" id="b-hours"> <span id="hours">00</span> <p>Giờ</p> </div>
            <div class="time-item" id="b-mins"> <span id="mins">00</span> <p>Phút</p> </div>
            <div class="time-item" id="b-secs"> <span id="secs">00</span> <p>Giây</p> </div>
        </div>

        <div class="date-start">10:50 - 24/12/2025</div>

        <audio id="player" controls loop autoplay>
            <source src="https://nguyenbacson.io.vn/nguyenbacson-missyou.mp3" type="audio/mpeg">
        </audio>

        <button onclick="triggerBirthdayBurst(event)" class="btn-newyear">🎉 CHÚC MỪNG SINH NHẬT DƯƠNG 🎂</button>

        <div class="footer">Gặp Em Đúng Lúc • Nhấp đúp vào màn hình</div>
    </div>

    <script>
        // --- 1. HỆ THỐNG TRANG TRÍ (Bóng & Icon) ---
        function createBalloons() {
            const container = document.getElementById('balloonBox');
            const colors = [ {c1: '#ff9a9e', c2: '#ff6b81'}, {c1: '#a18cd1', c2: '#fbc2eb'}, {c1: '#f6d365', c2: '#fda085'} ];
            for (let i = 0; i < 5; i++) {
                const b = document.createElement('div'); b.className = 'balloon';
                const color = colors[i % colors.length];
                b.style.left = (i * 20 + 10) + 'vw';
                b.style.setProperty('--c1', color.c1); b.style.setProperty('--c2', color.c2);
                b.style.setProperty('--d', (12 + Math.random() * 8) + 's');
                b.style.setProperty('--x', (Math.random() - 0.5) * 50 + 'px');
                b.style.setProperty('--r', (Math.random() - 0.5) * 30 + 'deg');
                b.style.animationDelay = - (Math.random() * 15) + 's';
                container.appendChild(b);
            }
        }
        createBalloons();

        function spawnBdayEmojis() {
            const emojis = ['🎂', '🎁', '🎉', '✨', '🎈', '🍰', '💐'];
            const container = document.getElementById('balloonBox');
            const el = document.createElement('div'); el.className = 'bday-emoji';
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = (Math.random() * 90 + 5) + 'vw';
            el.style.setProperty('--d', (10 + Math.random() * 6) + 's');
            el.style.setProperty('--x', (Math.random() - 0.5) * 100 + 'px');
            el.style.setProperty('--r', (Math.random() - 0.5) * 60 + 'deg');
            container.appendChild(el);
            setTimeout(() => el.remove(), 16000);
        }
        setInterval(spawnBdayEmojis, 2500);

        function spawnConfetti(amount) {
            const colors = ['#ff0a54', '#ff477e', '#ff7096', '#ffd700', '#00f5d4', '#fff'];
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < amount; i++) {
                let conf = document.createElement('div'); conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                if(Math.random() > 0.5) conf.style.borderRadius = '50%';
                else { conf.style.width = '10px'; conf.style.height = '18px'; }
                conf.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
                conf.style.animationDelay = Math.random() * 0.5 + 's';
                container.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }
        setInterval(() => spawnConfetti(4), 1000); // Rơi lai rai liên tục

        // --- 2. HỆ THỐNG PHÁO HOA VẬT LÝ CAO CẤP ---
        const cvs = document.getElementById('fwCanvas');
        const ctx = cvs.getContext('2d');
        let rockets = [], particles = [];
        let flashAlpha = 0; // Hiệu ứng chớp sáng khi nổ

        function resize() { 
            // Tối ưu độ phân giải cho mobile (Pixel Ratio)
            const dpr = window.devicePixelRatio || 1;
            cvs.width = window.innerWidth * dpr; 
            cvs.height = window.innerHeight * dpr; 
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize); resize();

        class Rocket {
            constructor(x, targetY) {
                this.x = x; this.y = window.innerHeight; this.targetY = targetY;
                this.speed = 12 + Math.random() * 4;
                this.color = '#fff'; // Bay lên màu trắng chói
            }
            update() {
                this.y -= this.speed;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff0055';
                ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow
            }
        }

        class Particle {
            constructor(x, y, color, isHeart = false) {
                this.x = x; this.y = y; this.color = color;
                this.life = 1; this.decay = Math.random() * 0.02 + 0.015;
                if(!isHeart) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 6 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.grav = 0.15; // Rơi nhanh hơn, thực tế hơn
                } else {
                    this.grav = 0.05; // Hình tim giữ dáng lâu hơn
                }
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, Math.random()*2+1.5, 0, Math.PI*2); ctx.fill();
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += this.grav; this.life -= this.decay;
                this.vx *= 0.96; this.vy *= 0.96; // Lực cản không khí
            }
        }

        function explode(x, y, type='heart') {
            flashAlpha = 0.4; // Chớp sáng màn hình
            const colors = ['#ff0055', '#ff477e', '#ffd700', '#fff'];
            let c = colors[Math.floor(Math.random()*colors.length)];
            
            if(type === 'heart') {
                const pCount = 35; // Nổ nét trên mobile
                for(let i=0; i<pCount; i++) {
                    let t = (Math.PI * 2 * i) / pCount;
                    let hx = 16 * Math.pow(Math.sin(t), 3);
                    let hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    let p = new Particle(x, y, c, true);
                    p.vx = hx * 0.2; p.vy = hy * 0.2; 
                    particles.push(p);
                }
            } else {
                for(let i=0; i<40; i++) particles.push(new Particle(x, y, c));
            }
        }

        function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight); 
            
            // Vẽ flash sáng
            if(flashAlpha > 0) {
                ctx.fillStyle = `rgba(255, 100, 150, ${flashAlpha})`;
                ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
                flashAlpha -= 0.05;
            }

            for(let i = rockets.length - 1; i >= 0; i--) {
                let r = rockets[i]; r.update();
                if(r.y <= r.targetY) { 
                    explode(r.x, r.y, Math.random() > 0.4 ? 'heart' : 'circle'); 
                    rockets.splice(i, 1); 
                }
            }
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1; // reset
        }
        loop();

        function launchDoubleFireworks() {
            const w = window.innerWidth; const h = window.innerHeight;
            rockets.push(new Rocket(w * 0.25, h * 0.25));
            rockets.push(new Rocket(w * 0.75, h * 0.3));
        }

        // --- SỰ KIỆN NÚT VIP ---
        function triggerBirthdayBurst(e) {
            if(e) e.preventDefault();
            const w = window.innerWidth; const h = window.innerHeight;
            // Bắn 4 quả liên tiếp
            setTimeout(() => rockets.push(new Rocket(w * 0.2, h * 0.3)), 0);
            setTimeout(() => rockets.push(new Rocket(w * 0.5, h * 0.15)), 300);
            setTimeout(() => rockets.push(new Rocket(w * 0.8, h * 0.3)), 600);
            setTimeout(() => rockets.push(new Rocket(w * 0.5, h * 0.4)), 900);
            spawnConfetti(80); // Tung ngập màn hình
            
            // Đổi chữ nút
            const btn = document.querySelector('.btn-newyear');
            btn.innerHTML = "I LOVE YOU 💖";
            btn.style.transform = "scale(1.05)";
            setTimeout(() => { btn.style.transform = "scale(1)"; }, 200);
        }

        // --- 3. ĐỒNG HỒ CAO CẤP ---
        const start = new Date(2025, 11, 24, 10, 50, 0).getTime();
        let lastSec = -1; let prevM = -1, prevH = -1, prevD = -1;

        function updateTime() {
            const now = new Date().getTime();
            const diff = now - start;
            if (diff < 0) return;
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h < 10 ? '0'+h : h;
            document.getElementById('mins').innerText = m < 10 ? '0'+m : m;
            document.getElementById('secs').innerText = s < 10 ? '0'+s : s;

            // Nổ pháo hoa mỗi phút tròn hoặc nửa phút
            if ((s === 0 || s === 30) && s !== lastSec) { launchDoubleFireworks(); lastSec = s; }
            if (s !== 0 && s !== 30) lastSec = -1;

            // Tim bay ra từ hộp giờ
            spawnMiniHeart('b-secs', '❤️', rnd(30), rnd(40));
            if(m !== prevM && prevM !== -1) spawnMiniHeart('b-mins', '💕', rnd(40), rnd(50)); prevM = m;
            if(h !== prevH && prevH !== -1) spawnMiniHeart('b-hours', '💘', rnd(40), rnd(50)); prevH = h;
            if(d !== prevD && prevD !== -1) spawnMiniHeart('b-days', '💝', rnd(40), rnd(50)); prevD = d;
        }
        function rnd(r) { return (Math.random() - 0.5) * r; }
        function spawnMiniHeart(id, icon, tx, rot) {
            const box = document.getElementById(id); if(!box) return;
            const el = document.createElement('div'); el.className = 'mini-heart'; el.innerText = icon;
            el.style.setProperty('--tx', tx+'px'); el.style.setProperty('--rot', rot+'deg');
            box.appendChild(el); setTimeout(() => el.remove(), 1200);
        }
        setInterval(updateTime, 1000); updateTime();

        // --- 4. TƯƠNG TÁC CHẠM ---
        document.addEventListener('click', () => { const aud = document.getElementById('player'); if(aud.paused) aud.play(); }, {once:true});
        
        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const now = new Date().getTime();
            if(now - lastTap < 400) { // Double tap mobile
                let x = e.changedTouches[0].clientX; let y = e.changedTouches[0].clientY;
                createClickEffect(x, y);
                explode(x, y, 'circle'); // Bấm đúp nổ pháo hoa nhỏ
            }
            lastTap = now;
        });

        function createClickEffect(x, y) {
            const el = document.createElement('div'); el.innerText = '💋';
            el.className = 'kiss-mark';
            el.style.left = x + 'px'; el.style.top = y + 'px';
            el.style.setProperty('--tx', (Math.random()-0.5)*50+'px');
            el.style.setProperty('--rot', (Math.random()-0.5)*40+'deg');
            document.body.appendChild(el); setTimeout(() => el.remove(), 1000);
        }
    </script>
</body>
</html>
