<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>❤️I LOVE YOU❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        /* ================= CẤU HÌNH GỐC TỰ ĐỘNG CO GIÃN ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --book-width: clamp(140px, 45vw, 360px); 
            --book-height: calc(var(--book-width) * 1.4); 
            --page-speed: 0.8s;
            --cover-color: #8a1c31; --bg-color: #ffd1dc;
            --env-scale: 1;
        }

        body, html {
            background-color: var(--bg-color);
            background: radial-gradient(circle at 50% 50%, #fff0f3 0%, #ffc2d1 60%, #ff9eb5 100%);
            height: 100%; width: 100%; overflow: hidden; font-family: 'Quicksand', sans-serif;
            perspective: 2000px;
        }

        /* ================= PHẦN 1: SÁCH ẢNH ================= */
        #player {
            position: fixed; top: 15px; right: 15px; display: none; align-items: center; gap: 15px;
            z-index: 1000; background: rgba(255,255,255,0.7); padding: 8px 20px 8px 8px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(5px);
            cursor: pointer; transition: opacity 1s;
        }
        .vinyl { width: 35px; height: 35px; background: #111; border-radius: 50%; border: 2px solid #fff; animation: spin 4s linear infinite; animation-play-state: paused; }
        .vinyl.playing { animation-play-state: running; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .stage {
            position: absolute; top: 50%; left: 50%; width: var(--book-width); height: var(--book-height);
            margin-top: calc(var(--book-height) / -2); margin-left: calc(var(--book-width) / -2);
            transition: transform 1s, opacity 1s; z-index: 10;
        }
        .stage.opened { transform: translateX(50%); }

        .book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
        .page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transform-origin: left center; transform-style: preserve-3d;
            transition: transform var(--page-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 2px 8px 8px 2px; overflow: hidden; background-color: #faf9f6; }
        .back { transform: rotateY(180deg); }
        .page.flipped { transform: rotateY(-180deg); }
        .content { padding: 5%; display: flex; flex-direction: column; }
        .photo-frame { width: 100%; height: 90%; background: #fff; padding: 3%; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* ================= PHẦN 2: TỎ TÌNH & TÂM THƯ VIP ================= */
        #confession-stage { position: absolute; inset: 0; z-index: 20; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #main-text { font-family: 'Dancing Script', cursive; font-size: clamp(24px, 7vw, 48px); color: #fff; text-shadow: 2px 2px 10px #ff0055; }
        .word { display: inline-block; margin: 0 5px; }
        .letter { display: inline-block; opacity: 0; transform: translateY(10px); }

        #letter-sequence {
            display: none; position: absolute; inset: 0; z-index: 50;
            justify-content: center; align-items: center; flex-direction: column;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); opacity: 0; transition: opacity 1s;
        }

        .envelope-container { 
            display: none; position: relative; width: 360px; height: 230px; 
            margin-top: 180px; animation: floatEnv 3s ease-in-out infinite alternate;
        }
        @keyframes floatEnv { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }

        .envelope { position: absolute; inset: 0; background: #e63946; border-radius: 0 0 10px 10px; z-index: 3; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .envelope:before { content: ''; position: absolute; top: 0; left: 0; border-left: 180px solid transparent; border-right: 180px solid transparent; border-bottom: 120px solid #ff4d6d; border-top: 110px solid transparent; z-index: 3; }
        .flap { position: absolute; top: 0; left: 0; border-left: 180px solid transparent; border-right: 180px solid transparent; border-top: 120px solid #d90429; border-bottom: 110px solid transparent; transform-origin: top; transition: transform 1.2s; z-index: 4; }
        .flap.open { transform: rotateX(180deg); z-index: 1; }
        .wax-seal { position: absolute; top: 110px; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: radial-gradient(circle, #d90429, #800000); border-radius: 50%; z-index: 5; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 24px; border: 2px solid gold; }
        .flap.open + .wax-seal { opacity: 0; pointer-events: none; }

        .paper {
            position: absolute; top: 10px; left: 5%; width: 90%; height: 420px; 
            background: #f8f1e5; border-radius: 5px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
            padding: 30px 20px; text-align: left; overflow-y: auto; transform: translateY(0);
            transition: transform 2s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 2;
            scrollbar-width: none; -ms-overflow-style: none; /* Ẩn scrollbar */
        }
        .paper::-webkit-scrollbar { display: none; }
        .paper.out { transform: translateY(-360px); }

        #typed-letter { font-size: 1.1rem; color: #4a2c2a; font-weight: 600; line-height: 1.6; font-family: 'Dancing Script', cursive; white-space: pre-wrap; }
        .cursor { display: inline-block; width: 2px; height: 1rem; background: #d90429; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* ================= PHẦN 3: VŨ TRỤ TRÁI TIM HD ================= */
        #galaxy-wrapper {
            position: absolute; inset: 0; z-index: 60; display: none; opacity: 0; transition: opacity 2s; 
            background: radial-gradient(circle at center, #660f22 0%, #2e030a 100%);
        }
        #galaxyCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }

        #photo-orbit { position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; z-index: 10; }
        .galaxy-photo { position: absolute; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 15px #ff3366; overflow: hidden; background: #000; cursor: pointer; }
        .galaxy-photo img { width: 100%; height: 100%; object-fit: cover; }

        #photo-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; }
        #photo-modal.active { opacity: 1; }
        #photo-modal img { max-width: 90%; max-height: 80%; border-radius: 10px; border: 3px solid #fff; }
    </style>
</head>
<body>

    <audio id="bookAudio" loop><source src="https://nguyenbacson.io.vn/pictures.mp3" type="audio/mpeg"></audio>
    <audio id="confessAudio"><source src="https://nguyenbacson.io.vn/nguyenbacson-missyou.mp3" type="audio/mpeg"></audio>

    <div class="stage" id="stage"><div class="book" id="book"></div></div>

    <div id="confession-stage">
        <div id="text-wrapper"><h1 id="main-text"></h1></div>
        <div id="ask-section" style="display:none; margin-top:20px;">
            <button class="glass-btn" onclick="accepted()">Đồng ý ❤️</button>
        </div>
    </div>

    <div id="letter-sequence">
        <div id="loading-text">Dành cho Dương...</div>
        <div class="envelope-container" id="envelope-container">
            <div class="flap" id="flap"></div>
            <div class="wax-seal">🔓</div>
            <div class="paper" id="paper">
                <div id="typed-letter"></div><span class="cursor"></span>
            </div>
            <div class="envelope"></div>
        </div>
    </div>

    <div id="galaxy-wrapper">
        <canvas id="galaxyCanvas"></canvas>
        <div id="photo-orbit"></div>
    </div>

    <div id="photo-modal" onclick="closeModal()"><img id="modal-img" src=""></div>

    <script>
        const images = ["https://nguyenbacson.io.vn/miss-you/1.jpeg", "https://nguyenbacson.io.vn/miss-you/2.jpeg", "https://nguyenbacson.io.vn/miss-you/3.jpeg", "https://nguyenbacson.io.vn/miss-you/4.jpeg", "https://nguyenbacson.io.vn/miss-you/5.jpeg", "https://nguyenbacson.io.vn/miss-you/6.jpeg", "https://nguyenbacson.io.vn/miss-you/7.jpeg", "https://nguyenbacson.io.vn/miss-you/8.jpeg", "https://nguyenbacson.io.vn/miss-you/9.jpeg", "https://nguyenbacson.io.vn/miss-you/10.jpeg", "https://nguyenbacson.io.vn/miss-you/11.jpeg", "https://nguyenbacson.io.vn/miss-you/12.jpeg", "https://nguyenbacson.io.vn/miss-you/13.jpeg", "https://nguyenbacson.io.vn/miss-you/14.jpeg", "https://nguyenbacson.io.vn/miss-you/15.jpeg"];

        // --- KHỞI TẠO SÁCH ---
        const book = document.getElementById('book');
        const totalSheets = images.length + 2;
        let pages = [];

        function buildBook() {
            const cover = document.createElement('div');
            cover.className = 'page cover'; cover.style.zIndex = totalSheets;
            cover.innerHTML = `<div class="front" style="background:var(--cover-color); display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fcebc0;">
                <h2 style="font-family:'Cinzel';">MISS YOU</h2>
                <div style="font-size:50px; cursor:pointer;" onclick="startAll()">❤️</div>
                <p>Trương Thị Dương</p>
            </div><div class="back"></div>`;
            book.appendChild(cover); pages.push(cover);

            images.forEach((src, i) => {
                const p = document.createElement('div');
                p.className = 'page'; p.style.zIndex = totalSheets - i - 1;
                p.innerHTML = `<div class="front content"><div class="photo-frame"><img src="${src}"></div></div><div class="back"></div>`;
                book.appendChild(p); pages.push(p);
            });

            const last = document.createElement('div');
            last.className = 'page'; last.style.zIndex = 0;
            last.innerHTML = `<div class="front content" style="justify-content:center; align-items:center; background:#fff0f3;">
                <h2 style="font-family:'Dancing Script'; color:#d6336c;">Gửi Dương ❤️</h2>
                <button class="glass-btn" onclick="toConfess()">Bấm vào đây</button>
            </div><div class="back"></div>`;
            book.appendChild(last); pages.push(last);
        }
        buildBook();

        function startAll() {
            document.getElementById('bookAudio').play();
            pages[0].classList.add('flipped');
            document.getElementById('stage').classList.add('opened');
        }

        pages.forEach((p, i) => {
            p.addEventListener('click', () => {
                if(i < pages.length - 1) {
                    p.classList.contains('flipped') ? p.classList.remove('flipped') : p.classList.add('flipped');
                }
            });
        });

        function toConfess() {
            document.getElementById('stage').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('stage').style.display = 'none';
                document.getElementById('confession-stage').style.display = 'flex';
                document.getElementById('confessAudio').play();
                startTypingIntro();
            }, 1000);
        }

        function startTypingIntro() {
            const h1 = document.getElementById('main-text');
            const txt = "Làm người yêu tớ nhé? ❤️";
            h1.innerHTML = txt.split('').map(c => `<span class='letter'>${c}</span>`).join('');
            anime({ targets: '.letter', opacity: [0, 1], translateY: [10, 0], delay: anime.stagger(50), complete: () => {
                document.getElementById('ask-section').style.display = 'block';
            }});
        }

        function accepted() {
            document.getElementById('confession-stage').style.display = 'none';
            const seq = document.getElementById('letter-sequence');
            seq.style.display = 'flex'; setTimeout(() => seq.style.opacity = 1, 100);
            setTimeout(showLetter, 2000);
        }

        function showLetter() {
            document.getElementById('envelope-container').style.display = 'block';
            setTimeout(() => document.getElementById('flap').classList.add('open'), 800);
            setTimeout(() => {
                const paper = document.getElementById('paper');
                paper.classList.add('out');
                const dest = document.getElementById('typed-letter');
                const msg = `Dương à,\n\nCảm ơn cậu vì đã gật đầu đồng ý làm người yêu của tớ. Đến tận bây giờ, tớ vẫn thấy mình thật sự may mắn khi có được cậu.\n\nTớ biết bản thân mình vẫn còn nhiều thiếu sót, vẫn còn đó sự thiếu tinh tế và đôi lúc cái tính trẻ con, thích hơn thua vẫn chưa sửa được. Tớ cũng muốn gửi lời xin lỗi đến cậu vì trong những ngày nghỉ Tết vừa qua đã làm cậu thêm mệt mỏi. Cậu vốn đã bận rộn phụ giúp gia đình bao nhiêu việc nhà, vậy mà vẫn phải kiên nhẫn "chịu đựng" và trả lời hết những câu hỏi ngớ ngẩn của tớ.\n\nNhưng điều làm tớ cảm động và trân trọng nhất là dù tớ có vô tư đến mức vô tâm như vậy, cậu cũng không vì thế mà ghét bỏ hay đẩy tớ ra xa. Cảm ơn sự dịu dàng và lòng bao dung mà cậu đã dành cho tớ trong suốt thời gian qua.\n\nTớ không dám hứa sẽ trở nên hoàn hảo ngay lập tức, nhưng tớ hứa sẽ cố gắng trưởng thành, thấu hiểu và tinh tế hơn mỗi ngày để có thể che chở, yêu thương cậu thật tốt.\n\nI LOVE YOU! ❤️\n\nNgười yêu của cậu,\nSơn`;
                
                let i = 0;
                function typing() {
                    if(i < msg.length) {
                        dest.innerHTML += msg.charAt(i);
                        i++;
                        paper.scrollTop = paper.scrollHeight; // Tự động cuộn
                        setTimeout(typing, 40);
                    } else {
                        // Viết xong, đợi 5 giây rồi chuyển cảnh
                        setTimeout(initGalaxy, 5000);
                    }
                }
                typing();
            }, 2500);
        }

        // --- TRÁI TIM RƠI HẠT (GALAXY EFFECT) ---
        function initGalaxy() {
            document.getElementById('letter-sequence').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('letter-sequence').style.display = 'none';
                document.getElementById('galaxy-wrapper').style.display = 'block';
                document.getElementById('galaxy-wrapper').style.opacity = 1;
                startGalaxyCanvas();
                buildOrbit();
            }, 1000);
        }

        function buildOrbit() {
            const orbit = document.getElementById('photo-orbit');
            images.forEach((src, i) => {
                const img = document.createElement('div');
                img.className = 'galaxy-photo';
                img.style.width = '60px'; img.style.height = '60px';
                const angle = (i / images.length) * Math.PI * 2;
                const x = Math.cos(angle) * 150;
                const z = Math.sin(angle) * 150;
                img.style.transform = `translate3d(${x}px, 0px, ${z}px)`;
                img.innerHTML = `<img src="${src}">`;
                img.onclick = () => { document.getElementById('modal-img').src = src; document.getElementById('photo-modal').style.display = 'flex'; setTimeout(()=>document.getElementById('photo-modal').classList.add('active'),10); };
                orbit.appendChild(img);
            });
            anime({ targets: '#photo-orbit', rotateY: 360, duration: 20000, easing: 'linear', loop: true });
        }

        function startGalaxyCanvas() {
            const canvas = document.getElementById('galaxyCanvas');
            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            let w, h, particles = [];

            function setSize() {
                w = window.innerWidth; h = window.innerHeight;
                canvas.width = w * dpr; canvas.height = h * dpr;
                ctx.scale(dpr, dpr);
            }
            setSize(); window.onresize = setSize;

            const heartPoints = [];
            for (let t = 0; t < Math.PI * 2; t += 0.01) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
                heartPoints.push({x: x * 10, y: y * 10});
            }

            class P {
                constructor() { this.reset(); }
                reset() {
                    const pt = heartPoints[Math.floor(Math.random()*heartPoints.length)];
                    this.x = w/2 + pt.x; this.y = h/2 + pt.y - 50;
                    this.ox = this.x; this.oy = this.y;
                    this.state = 0; this.age = 0; this.maxAge = 100 + Math.random()*200;
                    this.vx = (Math.random()-0.5)*2; this.vy = 0;
                    this.alpha = 1; this.color = `rgba(255, ${100 + Math.random()*100}, ${150 + Math.random()*50},`;
                }
                update() {
                    if(this.state === 0) {
                        this.age++; if(this.age > this.maxAge) this.state = 1;
                    } else {
                        this.vy += 0.1; this.x += this.vx; this.y += this.vy;
                        this.alpha -= 0.01; if(this.alpha <= 0) this.reset();
                    }
                }
                draw() {
                    ctx.fillStyle = this.color + this.alpha + ")";
                    ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, 7); ctx.fill();
                }
            }

            for(let i=0; i<1500; i++) particles.push(new P());

            function loop() {
                ctx.fillStyle = "rgba(46, 3, 10, 0.2)"; ctx.fillRect(0,0,w,h);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(loop);
            }
            loop();
        }

        function closeModal() { document.getElementById('photo-modal').classList.remove('active'); setTimeout(()=>document.getElementById('photo-modal').style.display='none',300); }
    </script>
</body>
</html>
